<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack &amp; Seal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
/* 전역 테마 토큰 — 4개 게임+허브 전부 동일한 값(크롬). 보드 타일색만 게임별 예외 */
:root, html[data-theme="simple"]{
  --bg:#1e1e1e; --panel-bg:#454545; --border:#444; --text:#eee; --text-dim:#999;
  --accent:#9ccc65; --accent-border:#8fbc5a;
  --btn-bg:#333; --btn-border:#555; --btn-accent-bg:#3a4d2a;
  --tab-inactive-bg:#333; --tab-inactive-border:#4d4d4d; --tab-inactive-text:#999;
  --modal-bg:#1e1e1e; --modal-border:#8fbc5a;
  --log-bg:#2a2a2a; --log-border:#444; --log-text:#999;
  --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --cell-a:#2b2b2b; --cell-b:#232323;
}
html[data-theme="brown"]{
  --bg:#1c0e05; --panel-bg:rgba(255,255,255,.10); --border:#3a2010; --text:#e8d5b0; --text-dim:#a08060;
  --accent:#c9a84c; --accent-border:#c9a84c;
  --btn-bg:transparent; --btn-border:#5a3a18; --btn-accent-bg:rgba(201,168,76,.18);
  --tab-inactive-bg:transparent; --tab-inactive-border:#5a3a18; --tab-inactive-text:#806040;
  --modal-bg:#1c0e05; --modal-border:#c9a84c;
  --log-bg:rgba(255,255,255,.03); --log-border:#3a2010; --log-text:#a08060;
  --font-family:'Crimson Text', Georgia, serif;
  --cell-a:#2c1f12; --cell-b:#22170d;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html{ overflow:hidden; }
body {
  background: var(--bg); color: var(--text); font-family: var(--font-family);
  line-height: 1.2;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 20px;
  overflow:hidden;
}
/* 좌/보드/우 3컬럼 공통 레이아웃 (4개 게임 공용 구조) */
.row3{ display:flex; gap:20px; align-items:flex-start; justify-content:center; flex-wrap:wrap; }
.col-left, .col-right{ display:flex; flex-direction:column; gap:10px; width:170px; flex-shrink:0; }
.mid-col{ display:flex; flex-direction:column; align-items:center; gap:10px; }
.coords-row { display:flex; margin-top:0; }
.coord-label { text-align:center; font-family:var(--font-family); font-size:11px; color:var(--text-dim); }
.rank-label { width:20px; text-align:center; font-family:var(--font-family); font-size:11px; color:var(--text-dim); }

#board { display:grid; box-shadow:0 0 40px rgba(0,0,0,.8); }
.cell {
  display:flex; align-items:center; justify-content:center; position:relative;
  cursor:default;
}
.cell.light { background:var(--cell-a); } .cell.dark { background:var(--cell-b); }
.cell.forbidden { background:rgba(255,60,60,.12) !important; }
.cell.threatened { background:rgba(255,180,0,.16) !important; }
.cell.clickable { cursor:pointer; }
.cell.clickable:hover { background:rgba(255,255,255,.08) !important; }

.stone-wrap { position:relative; width:50px; height:50px; pointer-events:none; }
.stone { width:40px; height:40px; border-radius:50%; position:absolute; }
.stone.black { background:radial-gradient(circle at 38% 32%, #4a4a4a, #111 55%, #000); box-shadow:0 3px 8px rgba(0,0,0,.9), inset 0 1px 2px rgba(255,255,255,.12); }
.stone.white { background:radial-gradient(circle at 38% 32%, #fff, #d8d8d8 55%, #bbb); box-shadow:0 3px 8px rgba(0,0,0,.5), inset 0 1px 3px rgba(255,255,255,.9); }
.layer1 .stone { top:5px; left:5px; }
.layer2 .stone-back { top:12px; left:12px; opacity:.6; filter:brightness(.55); z-index:1; }
.layer2 .stone-front { top:2px; left:2px; z-index:2; }

.threatened-ring {
  position:absolute; width:43px; height:43px; border-radius:50%;
  border:2px solid #ffb400; top:50%; left:50%; transform:translate(-50%,-50%);
  animation:pulse 1s infinite; pointer-events:none; z-index:10;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:translate(-50%,-50%) scale(1); }
  50% { opacity:.4; transform:translate(-50%,-50%) scale(1.1); }
}

.panel { background:var(--panel-bg); border:1px solid var(--border); border-radius:8px; padding:10px; }
.panel h3 { font-size:12px; color:var(--text-dim); font-weight:500; margin:0 0 8px 0; }
#turn-display { font-size:15px; font-weight:600; color:var(--accent); text-align:center; }
#status-msg { font-style:italic; font-size:.85rem; color:var(--text-dim); text-align:center; }
#ai-thinking { font-size:10px; color:var(--accent); min-height:14px; text-align:center; margin-top:6px; }

.score-row { display:flex; justify-content:space-between; align-items:center; padding:3px 0; font-size:12px; }
.score-row:not(:last-child) { border-bottom:1px solid var(--border); }
.score-val { color:var(--accent); font-weight:700; }

#log-box{
  margin-top:10px;
  background:var(--log-bg); border:1px solid var(--log-border);
  border-radius:6px; padding:8px 12px;
  width:480px; box-sizing:border-box;
  max-height:80px; overflow-y:auto;
}
#log{ font-size:11px; color:var(--log-text); font-family:monospace; white-space:pre-wrap; }
#log::-webkit-scrollbar { width:4px; } #log::-webkit-scrollbar-track { background:transparent; } #log::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.log-num { color:var(--accent); font-weight:600; }
.log-stack { color:#3a78f6; }
.log-destroy { color:#e05050; }
.log-result { color:var(--text); font-weight:600; display:block; margin-top:4px; }

#rules-box { font-size:.78rem; color:var(--text-dim); line-height:1.6; }
#rules-box .rules-title { color:var(--accent); margin-bottom:4px; }
.legend { display:flex; flex-direction:column; gap:6px; font-size:11px; color:var(--text-dim); }
.legend-item { display:flex; align-items:center; gap:8px; }
.leg-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.leg-dot.threat { background:rgba(255,180,0,.4); border:1px solid #ffb400; }
.leg-dot.forb { background:rgba(255,60,60,.2); border:1px solid #ff3c3c88; }

button { font-family:var(--font-family); font-size:13px; line-height:1.2; background:var(--btn-bg); border:1px solid var(--btn-border); color:var(--accent); padding:8px 14px; cursor:pointer; border-radius:6px; }
button:hover { background:var(--btn-accent-bg); border-color:var(--accent-border); }

.game-over-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:100; align-items:center; justify-content:center; }
.game-over-overlay.show { display:flex; }
.game-over-box { background:var(--modal-bg); border:2px solid var(--modal-border); border-radius:10px; padding:32px 40px; text-align:center; display:flex; flex-direction:column; gap:12px; }
.game-over-box h2 { font-size:18px; color:var(--accent); letter-spacing:.15em; }
.game-over-box p { font-size:13px; color:var(--text); }

/* 규칙 안내 모달 (4개 게임 공용 톤) */
#rules-modal{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75); z-index:150;
  align-items:center; justify-content:center;
}
#rules-modal.show{ display:flex; }
#rules-modal-box{
  background:var(--modal-bg); border:2px solid var(--modal-border);
  border-radius:10px; padding:20px; width:560px; max-height:90vh;
  overflow-y:auto; position:relative; font-family:var(--font-family);
}
#rules-modal-box h3{ color:var(--accent); font-size:1rem; letter-spacing:.08em; margin-bottom:14px; text-align:center; }
.rule-section{ margin-bottom:16px; }
.rule-section h5{ font-size:.78rem; color:var(--accent); margin-bottom:8px; }
.rule-section-body{ display:flex; gap:16px; align-items:flex-start; flex-wrap:wrap; }
.mini-board{ display:grid; gap:1px; background:#111; border:1px solid var(--border); width:fit-content; }
.mc{ width:32px; height:32px; display:flex; align-items:center; justify-content:center; position:relative; }
.mc.chk-l{ background:var(--cell-a); } .mc.chk-d{ background:var(--cell-b); }
.mc.forbidden{ background:rgba(255,60,60,.18) !important; }
.mc.threatened{ background:rgba(255,180,0,.22) !important; }
.mc .mstone{ width:22px; height:22px; border-radius:50%; position:relative; }
.mc .mstone.b1{ background:radial-gradient(circle at 38% 32%, #4a4a4a, #111 55%, #000); }
.mc .mstone.w1{ background:radial-gradient(circle at 38% 32%, #fff, #d8d8d8 55%, #bbb); }
.mc .mstone2{ position:absolute; width:22px; height:22px; border-radius:50%; }
.mc .mstone2.b1{ background:radial-gradient(circle at 38% 32%, #4a4a4a, #111 55%, #000); }
.mc .mstone2.w1{ background:radial-gradient(circle at 38% 32%, #fff, #d8d8d8 55%, #bbb); }
.mc .mstone2.back{ top:4px; left:4px; opacity:.6; filter:brightness(.55); }
.mc .mstone2.front{ top:-2px; left:-2px; }
.mc .dot{ width:14px; height:14px; border-radius:50%; background:rgba(58,120,246,.85); }
.rule-desc{ flex:1; min-width:180px; font-size:.78rem; color:var(--text-dim); line-height:1.7; }
#rules-close{
  position:absolute; top:10px; right:14px; width:28px; height:28px;
  background:none; border:none; color:var(--text-dim); font-size:1.1rem; cursor:pointer;
}
#rules-close:hover{ color:var(--accent); }

/* ===== 모바일 레이아웃 (좁은 화면에서 순서 재배치) ===== */
@media (max-width: 700px) {
  .row3{ gap:8px; }
  .col-left, .mid-col, .col-right{ display:contents; }
  .col-right > [aria-hidden="true"]{ display:none; }
  #status{ order:1; flex-basis:100%; }
  #boardWrap{ order:2; flex-basis:100%; }
  #log-box{ order:3; flex-basis:100%; width:auto; }
  .panel:has(#blackMoves){ order:4; flex-basis:100%; }
  #rules-box{ order:5; flex-basis:100%; }
  #resetBtn, #undoBtn, #rulesBtn{ order:6; flex-basis:calc(33.333% - 5.333px); }
  .panel:has(#ai-thinking){ order:7; flex-basis:100%; }
}
</style>
</head>
<body>

<div class="row3">
  <div class="col-left">
    <div id="status" class="panel" style="padding:0;height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;">
      <div id="turn-display">흑 차례</div>
      <div id="status-msg"></div>
    </div>
    <div class="panel">
      <h3>정보</h3>
      <div class="score-row"><span>흑 가능 수</span><span class="score-val" id="blackMoves">-</span></div>
      <div class="score-row"><span>백 가능 수</span><span class="score-val" id="whiteMoves">-</span></div>
      <div class="score-row"><span>위협받는 돌</span><span class="score-val" id="threatened">-</span></div>
    </div>
    <button id="resetBtn" onclick="resetGame()">새 게임</button>
    <button id="undoBtn" onclick="undoMove()">되돌리기</button>
    <div class="panel">
      <h3>AI (3초 제한)</h3>
      <div style="display:flex; align-items:center; gap:10px; font-size:13px; margin-bottom:8px;">
        <label style="display:flex; align-items:center; gap:4px;">
          <input type="radio" name="aiDepth" value="4"> 깊이4
        </label>
        <label style="display:flex; align-items:center; gap:4px;">
          <input type="radio" name="aiDepth" value="5" checked> 깊이5
        </label>
      </div>
      <label style="display:flex; align-items:center; gap:6px; font-size:13px; margin-bottom:6px;">
        <input type="checkbox" id="aiBlackToggle"> 흑 AI
      </label>
      <label style="display:flex; align-items:center; gap:6px; font-size:13px;">
        <input type="checkbox" id="aiWhiteToggle"> 백 AI
      </label>
      <div id="ai-thinking"></div>
    </div>
  </div>

  <div class="mid-col">
    <div id="boardWrap" style="display:flex;align-items:flex-start;justify-content:center;">
      <div id="rank-labels" style="display:flex;flex-direction:column;"></div>
      <div>
        <div id="board"></div>
        <div class="coords-row" id="file-labels"></div>
      </div>
    </div>
    <div id="log-box"><div id="log"></div></div>
  </div>

  <div class="col-right">
    <div style="height:52px;box-sizing:border-box;" aria-hidden="true"></div>
    <div class="panel" id="rules-box">
      <h3>범례</h3>
      <div class="legend">
        <div class="legend-item"><div class="leg-dot threat"></div> 위협받는 돌</div>
        <div class="legend-item"><div class="leg-dot forb"></div> 금수 칸</div>
      </div>
    </div>
    <button id="rulesBtn">규칙 보기</button>
  </div>
</div>

<div class="game-over-overlay" id="gameOver">
  <div class="game-over-box">
    <h2>GAME OVER</h2>
    <p id="gameOverText"></p>
    <button onclick="resetGame()">새 게임</button>
  </div>
</div>

<div id="rules-modal">
  <div id="rules-modal-box">
    <button id="rules-close">✕</button>
    <h3>규칙 안내</h3>
    <div id="rules-content"></div>
  </div>
</div>

<script>
const BOARD_FRAME_PX_MAX = 480; // 4개 게임 공통 상수 (데스크톱 최대값)
const SIZE = 8;
function getCell(){
  const available = window.innerWidth - 40;
  return Math.max(28, Math.min(Math.floor(BOARD_FRAME_PX_MAX/SIZE), Math.floor(available/SIZE)));
}
let CELL = getCell();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { CELL = getCell(); render(); }, 150);
});

// board[r][f]: null | {color:'b'|'w', layer:1|2}
let board = [];
let currentTurn = 'b'; // 'b' or 'w'
let history = [];
let pendingDestroy = [];
let gameOver = false;
let logEntries = []; // {text, isBlack} 완성된 줄 단위가 아니라 addMoveToLog에서 조립
let moveCount = 0;

function initBoard() {
  board = [];
  for (let r = 0; r < SIZE; r++) board.push(new Array(SIZE).fill(null));
}

function resetGame() {
  initBoard();
  currentTurn = 'b';
  history = [];
  pendingDestroy = [];
  gameOver = false;
  moveCount = 0;
  aiThinking = false;
  document.getElementById('ai-thinking').textContent = '';
  document.getElementById('gameOver').classList.remove('show');
  document.getElementById('log').innerHTML = '';
  render();
}

function fileChar(f) { return String.fromCharCode(97 + f); }
function rankNum(r) { return SIZE - r; }
function cellName(r, f) { return fileChar(f) + rankNum(r); }

function neighbors(r, f) {
  const res = [];
  if (r > 0) res.push([r-1, f]);
  if (r < SIZE-1) res.push([r+1, f]);
  if (f > 0) res.push([r, f-1]);
  if (f < SIZE-1) res.push([r, f+1]);
  return res;
}

// b: 시뮬레이션용 보드 (기본값: 실제 게임 보드) — AI 탐색에서 복제 보드를 넘겨 쓸 수 있게 파라미터화
function canPlace(r, f, color, b=board) {
  const cell = b[r][f];
  if (cell && cell.layer === 2) return false;
  if (cell && cell.color !== color) return false;

  if (!cell) {
    for (const [nr, nf] of neighbors(r, f)) {
      const n = b[nr][nf];
      if (n && n.color !== color && n.layer === 2) return false;
    }
    return true;
  }
  if (cell.color === color && cell.layer === 1) return true;
  return false;
}

function getValidMoves(color, b=board) {
  const moves = [];
  for (let r = 0; r < SIZE; r++)
    for (let f = 0; f < SIZE; f++)
      if (canPlace(r, f, color, b)) moves.push([r, f]);
  return moves;
}

// 위협 계산: 2층 돌 인접 상대 1층 돌 목록
function calcThreats(b=board) {
  const threats = {};
  for (let r = 0; r < SIZE; r++) {
    for (let f = 0; f < SIZE; f++) {
      const cell = b[r][f];
      if (cell && cell.layer === 2) {
        for (const [nr, nf] of neighbors(r, f)) {
          const n = b[nr][nf];
          if (n && n.color !== cell.color && n.layer === 1) threats[`${nr},${nf}`] = true;
        }
      }
    }
  }
  return threats;
}

function addMoveToLog(text, isBlack, destroyed){
  const log = document.getElementById('log');
  if(isBlack){
    const ns = document.createElement('span'); ns.className='log-num'; ns.textContent = `${moveCount}.`;
    log.appendChild(ns); log.appendChild(document.createTextNode(text));
  } else {
    log.appendChild(document.createTextNode(' '+text));
  }
  if(destroyed && destroyed.length){
    const d = document.createElement('span'); d.className='log-destroy'; d.textContent = '×'+destroyed.join(',');
    log.appendChild(d);
  }
  if(!isBlack) log.appendChild(document.createTextNode(' '));
  log.scrollTop = log.scrollHeight;
}
function appendLog(html){
  const log = document.getElementById('log'); const span = document.createElement('span');
  span.innerHTML = html; log.appendChild(span); log.scrollTop = log.scrollHeight;
}

function doPlace(r, f) {
  if (gameOver) return;
  if (!canPlace(r, f, currentTurn)) return;

  history.push({
    board: JSON.parse(JSON.stringify(board)),
    currentTurn,
    pendingDestroy: [...pendingDestroy],
    logHTML: document.getElementById('log').innerHTML,
    moveCount,
  });

  const cell = board[r][f];
  const isStack = cell && cell.color === currentTurn && cell.layer === 1;
  const isBlack = currentTurn === 'b';
  if(isBlack) moveCount++;

  board[r][f] = { color: currentTurn, layer: isStack ? 2 : 1 };

  // 이전 상대 수로 위협받은 채 방어 못 한 내 돌 파괴
  const destroyed = [];
  for (const key of pendingDestroy) {
    const [dr, df] = key.split(',').map(Number);
    const stone = board[dr][df];
    if (stone && stone.layer === 1) { board[dr][df] = null; destroyed.push(cellName(dr, df)); }
  }

  addMoveToLog(cellName(r,f) + (isStack ? '^' : ''), isBlack, destroyed);

  // 이번 수로 생긴 2층이 위협하는 상대 1층 → 다음 pendingDestroy
  const nextPending = [];
  if (board[r][f].layer === 2) {
    for (const [nr, nf] of neighbors(r, f)) {
      const n = board[nr][nf];
      if (n && n.color !== currentTurn && n.layer === 1) nextPending.push(`${nr},${nf}`);
    }
  }
  pendingDestroy = nextPending;

  const nextTurn = currentTurn === 'b' ? 'w' : 'b';
  const nextMoves = getValidMoves(nextTurn);
  if (nextMoves.length === 0) {
    gameOver = true;
    const winner = currentTurn === 'b' ? '흑' : '백';
    appendLog(`<span class="log-result">${winner} 승리 — 상대 봉쇄</span>`);
    render();
    showGameOver(winner);
    return;
  }

  currentTurn = nextTurn;
  render();
  maybeTriggerAI();
}

function showGameOver(winner) {
  document.getElementById('gameOverText').textContent = `${winner}이 상대를 완전히 봉쇄했습니다.`;
  document.getElementById('gameOver').classList.add('show');
}

function undoMove() {
  if (history.length === 0) return;
  const snap = history.pop();
  board = snap.board;
  currentTurn = snap.currentTurn;
  pendingDestroy = snap.pendingDestroy;
  moveCount = snap.moveCount;
  gameOver = false;
  document.getElementById('log').innerHTML = snap.logHTML;
  document.getElementById('gameOver').classList.remove('show');
  render();
}

// ── AI 엔진: 메인스레드 negamax + 알파베타, 고정 깊이 + 3초 데드라인 ───────────
// 체스류가 아니라 기물가치 개념이 없음 — 모빌리티 차 / 2층(겹침) 개수 차 / 순위협 차로 평가.
let aiEnabled = { b:false, w:false };
let aiThinking = false;
let SEARCH_DEPTH = 5;

document.querySelectorAll('input[name="aiDepth"]').forEach(radio => {
  radio.onchange = (e) => {
    if(e.target.checked) SEARCH_DEPTH = parseInt(e.target.value);
  };
});
document.getElementById('aiBlackToggle').onchange = (e) => { aiEnabled.b = e.target.checked; maybeTriggerAI(); };
document.getElementById('aiWhiteToggle').onchange = (e) => { aiEnabled.w = e.target.checked; maybeTriggerAI(); };

function maybeTriggerAI(){
  if(gameOver || aiThinking) return;
  if(aiEnabled[currentTurn]){
    aiThinking = true;
    const label = currentTurn === 'b' ? '흑' : '백';
    document.getElementById('ai-thinking').textContent = label + ' AI 계산 중...';
    setTimeout(runAIMove, 50);
  }
}

function runAIMove(){
  aiThinking = false;
  document.getElementById('ai-thinking').textContent = '';
  if(gameOver) return;
  const mv = findBestMove(board, pendingDestroy, currentTurn, SEARCH_DEPTH);
  if(!mv) return;
  doPlace(mv[0], mv[1]);
}

// 순수 함수: b/pendingDestroy를 복제해 다음 상태를 반환 (실제 게임 상태에 영향 없음)
function applyMoveSim(b, pd, r, f, color){
  const nb = b.map(row => row.map(cell => cell ? {...cell} : null));
  const cell = nb[r][f];
  const isStack = cell && cell.color === color && cell.layer === 1;
  nb[r][f] = { color, layer: isStack ? 2 : 1 };

  for (const key of pd) {
    const [dr, df] = key.split(',').map(Number);
    if (nb[dr][df] && nb[dr][df].layer === 1) nb[dr][df] = null;
  }

  const nextPending = [];
  if (nb[r][f].layer === 2) {
    for (const [nr, nf] of neighbors(r, f)) {
      const n = nb[nr][nf];
      if (n && n.color !== color && n.layer === 1) nextPending.push(`${nr},${nf}`);
    }
  }
  return { board: nb, pendingDestroy: nextPending };
}

// color 시점 평가 (양수 = color에게 유리). 모빌리티차×3 + 2층개수차×5 + 순위협차×2 (초기값, 추후 자가대국으로 튜닝 예정)
function evaluateStack(b, color){
  const opp = color === 'b' ? 'w' : 'b';
  const myMoves = getValidMoves(color, b).length;
  const oppMoves = getValidMoves(opp, b).length;
  const mobilityDiff = myMoves - oppMoves;

  let myLayer2 = 0, oppLayer2 = 0;
  for (let r=0;r<SIZE;r++) for (let f=0;f<SIZE;f++){
    const cell = b[r][f]; if (!cell || cell.layer !== 2) continue;
    if (cell.color === color) myLayer2++; else oppLayer2++;
  }
  const layer2Diff = myLayer2 - oppLayer2;

  const threats = calcThreats(b);
  let myThreatsOnOpp = 0, oppThreatsOnMe = 0;
  for (const key in threats) {
    const [r,f] = key.split(',').map(Number);
    const stone = b[r][f]; if (!stone) continue;
    if (stone.color === opp) myThreatsOnOpp++;
    else if (stone.color === color) oppThreatsOnMe++;
  }
  const threatDiff = myThreatsOnOpp - oppThreatsOnMe;

  return mobilityDiff*3 + layer2Diff*5 + threatDiff*2;
}

let searchStart = 0;
const TIME_LIMIT = 3000; // 3초 (4개 게임 공통 제한)

function negamaxStack(b, pd, depth, alpha, beta, color){
  const moves = getValidMoves(color, b);
  if (moves.length === 0) return -9999; // color 차례인데 둘 곳이 없음 → color 패배(봉쇄)
  if (depth === 0 || Date.now()-searchStart > TIME_LIMIT) return evaluateStack(b, color);

  // 겹침(2층 생성) 수를 우선 탐색 — 위협/방어를 만드는 수라 가지치기에 유리
  moves.sort((a,c) => {
    const as = b[a[0]][a[1]] && b[a[0]][a[1]].color===color && b[a[0]][a[1]].layer===1;
    const cs = b[c[0]][c[1]] && b[c[0]][c[1]].color===color && b[c[0]][c[1]].layer===1;
    return (cs?1:0) - (as?1:0);
  });

  const opp = color === 'b' ? 'w' : 'b';
  let best = -Infinity;
  for (const [r,f] of moves) {
    const { board: nb, pendingDestroy: npd } = applyMoveSim(b, pd, r, f, color);
    const val = -negamaxStack(nb, npd, depth-1, -beta, -alpha, opp);
    if (val > best) best = val;
    if (best > alpha) alpha = best;
    if (alpha >= beta) break;
    if (Date.now()-searchStart > TIME_LIMIT) break;
  }
  return best;
}

function findBestMove(b, pd, color, maxDepth){
  const moves = getValidMoves(color, b);
  if (moves.length === 0) return null;

  searchStart = Date.now();
  for (let i=moves.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [moves[i],moves[j]]=[moves[j],moves[i]]; }

  const opp = color === 'b' ? 'w' : 'b';
  let alpha = -Infinity, beta = Infinity;
  let bestMove = moves[0], bestVal = -Infinity;

  for (const [r,f] of moves) {
    if (Date.now()-searchStart > TIME_LIMIT) break;
    const { board: nb, pendingDestroy: npd } = applyMoveSim(b, pd, r, f, color);
    const val = -negamaxStack(nb, npd, maxDepth-1, -beta, -alpha, opp);
    if (val > bestVal) { bestVal = val; bestMove = [r,f]; }
    if (bestVal > alpha) alpha = bestVal;
  }
  return bestMove;
}

function makeStoneEl(color, layer) {
  const wrap = document.createElement('div');
  wrap.className = 'stone-wrap ' + (layer === 2 ? 'layer2' : 'layer1');
  if (layer === 1) {
    const s = document.createElement('div');
    s.className = 'stone ' + (color === 'b' ? 'black' : 'white');
    wrap.appendChild(s);
  } else {
    const back = document.createElement('div');
    back.className = 'stone ' + (color === 'b' ? 'black' : 'white') + ' stone-back';
    const front = document.createElement('div');
    front.className = 'stone ' + (color === 'b' ? 'black' : 'white') + ' stone-front';
    wrap.appendChild(back);
    wrap.appendChild(front);
  }
  return wrap;
}

function buildRankLabels(){
  const rl = document.getElementById('rank-labels');
  rl.innerHTML = '';
  for (let r = 0; r < SIZE; r++) {
    const sp = document.createElement('div');
    sp.className = 'rank-label';
    sp.style.height = CELL+'px';
    sp.style.lineHeight = CELL+'px';
    sp.textContent = SIZE - r;
    rl.appendChild(sp);
  }
}
function buildFileLabels(){
  const fl = document.getElementById('file-labels');
  fl.innerHTML = '';
  for (let f = 0; f < SIZE; f++) {
    const sp = document.createElement('div');
    sp.className = 'coord-label';
    sp.style.width = CELL+'px';
    sp.textContent = fileChar(f);
    fl.appendChild(sp);
  }
}

function render() {
  buildRankLabels();
  buildFileLabels();

  const validMoves = gameOver ? [] : getValidMoves(currentTurn);
  const validSet = new Set(validMoves.map(([r,f]) => `${r},${f}`));
  const threatenedNow = calcThreats();

  const boardEl = document.getElementById('board');
  boardEl.style.gridTemplateColumns = `repeat(${SIZE}, ${CELL}px)`;
  boardEl.style.gridTemplateRows = `repeat(${SIZE}, ${CELL}px)`;
  boardEl.innerHTML = '';

  for (let r = 0; r < SIZE; r++) {
    for (let f = 0; f < SIZE; f++) {
      const cell = document.createElement('div');
      const isLight = (r + f) % 2 === 0;
      cell.className = 'cell ' + (isLight ? 'light' : 'dark');
      cell.style.width = CELL+'px'; cell.style.height = CELL+'px';

      const key = `${r},${f}`;
      const stone = board[r][f];
      const isValid = validSet.has(key);
      const isThreatened = threatenedNow[key];

      if (!stone && !isValid) {
        let hasForbid = false;
        for (const [nr,nf] of neighbors(r,f)) {
          const n = board[nr][nf];
          if (n && n.color !== currentTurn && n.layer === 2) { hasForbid = true; break; }
        }
        if (hasForbid) cell.classList.add('forbidden');
      }
      if (isThreatened) cell.classList.add('threatened');
      if (isValid && !gameOver) {
        cell.classList.add('clickable');
        cell.addEventListener('click', () => doPlace(r, f));
      }
      if (stone) {
        cell.appendChild(makeStoneEl(stone.color, stone.layer));
        if (isThreatened) {
          const ring = document.createElement('div');
          ring.className = 'threatened-ring';
          cell.appendChild(ring);
        }
      }
      boardEl.appendChild(cell);
    }
  }

  document.getElementById('turn-display').textContent = (currentTurn === 'b' ? '흑' : '백') + ' 차례';
  const myThreats = Object.keys(threatenedNow).some(key => {
    const [r,f] = key.split(',').map(Number);
    return board[r][f]?.color === currentTurn;
  });
  document.getElementById('status-msg').textContent = (!gameOver && myThreats) ? '위협받는 돌 있음' : '';

  document.getElementById('blackMoves').textContent = getValidMoves('b').length;
  document.getElementById('whiteMoves').textContent = getValidMoves('w').length;
  document.getElementById('threatened').textContent = Object.keys(threatenedNow).length;
}

// ── 규칙 안내 모달 ────────────────────────────────────────────────────────
function makeGrid(size){ return Array.from({length:size}, () => Array(size).fill(null)); }

function buildRulesSections(){
  const sections = [];

  // 1. 배치 & 금수
  {
    const g = makeGrid(3);
    g[1][1] = 'w2'; // 상대(백) 2층
    g[0][1] = 'forbid'; g[2][1] = 'forbid'; g[1][0] = 'forbid'; g[1][2] = 'forbid';
    sections.push({
      title:'배치 & 금수',
      grid:g,
      desc:'빈 칸에 자유롭게 돌을 놓을 수 있다. 단, 상대의 2층 돌과 인접한 빈 칸(금수 칸, 빨간 표시)에는 놓을 수 없다.'
    });
  }
  // 2. 겹침
  {
    const g = makeGrid(3);
    g[1][1] = 'b1';
    sections.push({
      title:'겹침',
      grid:g,
      desc:'자신의 1층 돌 위에는 겹쳐서 2층으로 만들 수 있다(같은 칸을 다시 선택). 2층 돌은 위/아래로 겹쳐 쌓이며, 그 위에는 더 이상 아무것도 놓을 수 없다.'
    });
  }
  // 3. 위협 & 파괴
  {
    const g = makeGrid(3);
    g[1][1] = 'b2';
    g[0][1] = 'w1-threat';
    sections.push({
      title:'위협 & 파괴',
      grid:g,
      desc:'2층 돌은 인접한 상대의 1층 돌을 위협한다(주황 표시). 위협받은 돌의 주인이 바로 다음 자신의 차례에 그 칸을 2층으로 방어하지 못하면, 그 돌은 파괴되어 보드에서 사라진다.'
    });
  }

  return sections;
}

function renderMiniStone(cell, spec){
  if(spec==='b1' || spec==='w1' || spec==='w1-threat'){
    if(spec==='w1-threat') cell.classList.add('threatened');
    const s = document.createElement('div');
    s.className = 'mstone ' + (spec.startsWith('b') ? 'b1' : 'w1');
    cell.appendChild(s);
  } else if(spec==='b2' || spec==='w2'){
    const color = spec[0];
    const back = document.createElement('div'); back.className = 'mstone2 back ' + color+'1';
    const front = document.createElement('div'); front.className = 'mstone2 front ' + color+'1';
    cell.appendChild(back); cell.appendChild(front);
  } else if(spec==='forbid'){
    cell.classList.add('forbidden');
  }
}

function renderRulesContent(){
  const cont = document.getElementById('rules-content');
  cont.innerHTML = '';
  for(const sec of buildRulesSections()){
    const wrap = document.createElement('div');
    wrap.className = 'rule-section';
    const h5 = document.createElement('h5'); h5.textContent = sec.title;
    wrap.appendChild(h5);

    const body = document.createElement('div');
    body.className = 'rule-section-body';

    const size = sec.grid.length;
    const mb = document.createElement('div');
    mb.className = 'mini-board';
    mb.style.gridTemplateColumns = `repeat(${size}, 40px)`;
    mb.style.gridTemplateRows = `repeat(${size}, 40px)`;
    for(let r=0;r<size;r++){
      for(let c=0;c<size;c++){
        const cell = document.createElement('div');
        const isL = (r+c)%2===0;
        cell.className = 'mc ' + (isL?'chk-l':'chk-d');
        const spec = sec.grid[r][c];
        if(spec) renderMiniStone(cell, spec);
        mb.appendChild(cell);
      }
    }
    body.appendChild(mb);

    const desc = document.createElement('div');
    desc.className = 'rule-desc';
    desc.textContent = sec.desc;
    body.appendChild(desc);

    wrap.appendChild(body);
    cont.appendChild(wrap);
  }
  const win = document.createElement('div');
  win.className = 'rule-section';
  const h5 = document.createElement('h5'); h5.textContent = '승리 조건';
  win.appendChild(h5);
  const desc = document.createElement('div');
  desc.className = 'rule-desc';
  desc.textContent = '자신의 차례에 돌을 놓을 수 있는 칸이 하나도 없으면(완전히 봉쇄당하면) 패배한다. 상대를 봉쇄시킨 쪽이 승리.';
  win.appendChild(desc);
  cont.appendChild(win);
}

function openRulesModal(){
  renderRulesContent();
  document.getElementById('rules-modal').classList.add('show');
  notifyModal(true);
}
function closeRulesModal(){
  document.getElementById('rules-modal').classList.remove('show');
  notifyModal(false);
}
document.getElementById('rulesBtn').onclick = openRulesModal;
document.getElementById('rules-close').onclick = closeRulesModal;
document.getElementById('rules-modal').addEventListener('click', (e) => { if(e.target === e.currentTarget) closeRulesModal(); });

// 모달이 열리고 닫힐 때 허브 상단(헤더/네비)도 함께 어둡게 처리하도록 알림
function notifyModal(open){
  try{ window.parent.postMessage({type:'newchess-modal', open}, '*'); }catch(e){}
}

// ===== 허브에 실제 콘텐츠 높이 보고 (iframe 자체 스크롤 방지) =====
function reportHeight(){
  try{ window.parent.postMessage({type:'newchess-height', height: document.documentElement.scrollHeight}, '*'); }catch(e){}
}
new ResizeObserver(reportHeight).observe(document.body);
window.addEventListener('load', reportHeight);
reportHeight();

// 허브의 어두운 배경(hub-dim) 클릭 시 열려있는 모달 닫기
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'newchess-close-modal') {
    closeRulesModal();
  }
});

// ===== 전역 테마 (심플/브라운) — 토글은 허브에만 있고, 여기서는 반영만 =====
const THEME_KEY = 'newchess-theme';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
}
applyTheme(localStorage.getItem(THEME_KEY) || 'simple');
window.addEventListener('storage', (e) => {
  if (e.key === THEME_KEY) applyTheme(e.newValue || 'simple');
});

// ── 시작 ──────────────────────────────────────────────────────────────────
resetGame();
</script>
