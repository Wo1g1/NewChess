<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>10x10 변형 체스</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Crimson+Text:ital,wght@0,400;0,600&display=swap');
  /* 실제 보드 색은 테마와 무관하게 항상 고정 */
  :root{
    --light-sq:#eeeed2;
    --dark-sq:#769656;
  }
  /* 전역 테마 토큰 — 심플(기본) */
  :root, html[data-theme="simple"]{
    --bg:#1e1e1e; --panel-bg:#2a2a2a; --border:#444; --text:#eee; --text-dim:#999;
    --accent:#9ccc65; --accent-border:#8fbc5a;
    --btn-bg:#333; --btn-border:#555; --btn-accent-bg:#3a4d2a;
    --tab-inactive-bg:#333; --tab-inactive-border:#4d4d4d; --tab-inactive-text:#999;
    --modal-bg:#1e1e1e; --modal-border:#8fbc5a;
    --log-bg:#2a2a2a; --log-border:#444; --log-text:#999;
    --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  /* 전역 테마 토큰 — 브라운 */
  html[data-theme="brown"]{
    --bg:#1c0e05; --panel-bg:#2a1508; --border:#3a2010; --text:#e8d5b0; --text-dim:#a08060;
    --accent:#c9a84c; --accent-border:#c9a84c;
    --btn-bg:transparent; --btn-border:#5a3a18; --btn-accent-bg:rgba(201,168,76,.18);
    --tab-inactive-bg:transparent; --tab-inactive-border:#5a3a18; --tab-inactive-text:#806040;
    --modal-bg:#1c0e05; --modal-border:#c9a84c;
    --log-bg:rgba(255,255,255,.03); --log-border:#3a2010; --log-text:#a08060;
    --font-family:'Crimson Text', Georgia, serif;
  }
  body{
    font-family: var(--font-family);
    background:var(--bg);
    color:var(--text);
    margin:0;
    padding:24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
  }
  h1{font-size:18px; font-weight:500; margin:0;}
  #theme-toggle{ display:flex; gap:4px; }
  #theme-toggle button{
    flex:1; font-size:11px; padding:6px 4px;
  }
  #theme-toggle button.active{ background:var(--btn-accent-bg); border-color:var(--accent-border); color:var(--accent); }
  #status{
    font-size:15px;
    padding:8px 16px;
    border-radius:8px;
    background:var(--panel-bg);
    min-height:20px;
  }
  #status.check{color:#ffb84d;}
  #status.over{color:#ff6b6b; font-weight:600;}
  .main{
    display:flex;
    gap:24px;
    align-items:flex-start;
  }
  #boardWrap{
    display:grid;
  }
  .sq{
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    user-select:none;
    line-height:1;
    position:relative;
  }
  .sq.light{background:var(--light-sq);}
  .sq.dark{background:var(--dark-sq);}
  .sq.selected{outline:3px solid #f2c744; outline-offset:-3px;}
  .sq.inCheck{outline:3px solid #ff3b3b; outline-offset:-3px;}
  .glyph.white-piece{color:#ffffff; text-shadow:0 0 1px #000, 0 0 2px #000; position:relative; z-index:2;}
  .glyph.black-piece{color:#000000; position:relative; z-index:2;}
  .rowlabel, .collabel{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    color:#999;
  }
  .marker{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    border-radius:50%;
    pointer-events:none;
    z-index:1;
  }
  .marker.move{background:#3478f6; width:32%; height:32%;}
  .marker.capture{background:none; width:78%; height:78%; border:4px solid #e63c3c; border-radius:50%; box-sizing:border-box;}
  .side{
    width:170px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .panel{
    background:var(--panel-bg);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px;
  }
  .panel h3{margin:0 0 8px 0; font-size:12px; color:var(--text-dim); font-weight:500;}
  .captured-row{
    display:flex;
    flex-wrap:wrap;
    gap:2px;
    font-size:20px;
    min-height:26px;
  }
  button{
    padding:8px 14px;
    border-radius:6px;
    border:1px solid var(--btn-border);
    background:var(--btn-bg);
    color:var(--text);
    cursor:pointer;
    font-size:13px;
    font-family:var(--font-family);
  }
  button:hover{background:var(--btn-accent-bg);}
  #promoModal{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
  }
  #promoModal.show{display:flex;}
  #promoBox{
    background:var(--panel-bg);
    border:1px solid var(--border);
    border-radius:10px;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
  }
  #promoBox .choices{display:flex; gap:10px;}
  #promoBox .choices button{
    font-size:32px;
    width:56px;
    height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  /* 기보 (4개 게임 공용 스타일) */
  #log-box{
    margin-top:10px;
    background:var(--log-bg); border:1px solid var(--log-border);
    border-radius:6px; padding:8px 12px;
    width:100%; max-width:720px;
    max-height:80px; overflow-y:auto;
  }
  #log{ font-size:11px; color:var(--log-text); font-family:monospace; white-space:pre-wrap; }

  /* 기물 행마 안내 모달 (4개 게임 공용 스타일) */
  #piece-modal{
    display:none; position:fixed;
    top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.75);
    align-items:center; justify-content:center; z-index:100;
  }
  #piece-modal.show{ display:flex; }
  #piece-modal-box{
    background:var(--modal-bg); border:2px solid var(--modal-border);
    border-radius:10px; padding:20px; width:520px; max-height:90vh;
    overflow-y:auto; position:relative;
  }
  #piece-modal-box h3{ color:var(--accent); font-size:15px; margin-bottom:12px; text-align:center; }
  #piece-tabs{ display:flex; flex-wrap:wrap; gap:5px; margin-bottom:14px; }
  .ptab{
    background:var(--tab-inactive-bg); color:var(--tab-inactive-text); border:1px solid var(--tab-inactive-border);
    padding:4px 9px; cursor:pointer; font-size:11px; border-radius:4px;
    width:auto; font-family:var(--font-family);
  }
  .ptab.active{ background:var(--btn-accent-bg); color:var(--accent); border-color:var(--accent-border); }
  .ptab:hover{ filter:brightness(1.2); }
  #piece-content{ display:flex; flex-wrap:wrap; gap:16px; align-items:flex-start; }
  .terrain-section{ flex:1; min-width:160px; }
  .terrain-section h5{ font-size:11px; color:var(--accent); margin-bottom:6px; text-align:center; }
  .mini-board{
    display:grid; gap:1px; background:#111; border:1px solid var(--border);
    width:fit-content; margin:0 auto 6px auto;
  }
  .mc{ width:32px; height:32px; display:flex; align-items:center; justify-content:center; font-size:16px; position:relative; }
  /* 보드 실제 색과 동일한 체커 — 테마와 무관하게 고정 */
  .mc.chk-l{ background:var(--light-sq); }
  .mc.chk-d{ background:var(--dark-sq); }
  .mc.piece-cell{ background:#9a8010 !important; }
  .mc.ally{ background:#2a5a9a !important; }
  /* 이동/캡처 표기 — 색은 테마와 무관하게 고정: 이동=파랑, 캡처=빨강, 이동+캡처=보라 */
  .mc .dot, .leg-box .dot{ position:absolute; top:50%; left:50%; border-radius:50%; transform:translate(-50%,-50%); }
  .mc .dot{ width:16px; height:16px; z-index:1; }
  .leg-box .dot{ width:11px; height:11px; }
  .dot.mv{ background:rgba(58,120,246,.85); }
  .dot.cap{ background:rgba(230,60,60,.85); }
  .dot.mvcap{ background:rgba(155,89,182,.9); }
  .piece-desc{ font-size:10px; color:var(--text-dim); line-height:1.6; margin-top:4px; }
  .legend-row{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .leg{ display:flex; align-items:center; gap:3px; font-size:10px; color:var(--text-dim); }
  .leg-box{ width:12px; height:12px; border-radius:2px; position:relative; background:rgba(255,255,255,.08); }
  #piece-close{
    position:absolute; top:10px; right:14px;
    background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; width:auto;
  }
  #piece-close:hover{ color:var(--accent); }
</style>
</head>
<body>

<h1>10×10 변형 체스 (수동 대국)</h1>
<div id="theme-toggle">
  <button data-theme-btn="simple">심플</button>
  <button data-theme-btn="brown">브라운</button>
</div>
<div id="status">백 차례</div>

<div class="main">
  <div class="side">
    <div class="panel">
      <h3>흑에게 잡힌 백 기물</h3>
      <div class="captured-row" id="capWhite"></div>
    </div>
    <button id="resetBtn">새 게임</button>
    <button id="undoBtn">되돌리기</button>
    <button id="rulesBtn">기물 행마 보기</button>
    <div class="panel">
      <h3>AI (3초 제한)</h3>
      <div style="display:flex; align-items:center; gap:10px; font-size:13px; margin-bottom:8px;">
        <label style="display:flex; align-items:center; gap:4px;">
          <input type="radio" name="aiDepth" value="4"> 깊이4
        </label>
        <label style="display:flex; align-items:center; gap:4px;">
          <input type="radio" name="aiDepth" value="5" checked> 깊이5
        </label>
      </div>
      <label style="display:flex; align-items:center; gap:6px; font-size:13px; margin-bottom:6px;">
        <input type="checkbox" id="aiWhiteToggle"> 백 AI
      </label>
      <label style="display:flex; align-items:center; gap:6px; font-size:13px;">
        <input type="checkbox" id="aiBlackToggle"> 흑 AI
      </label>
    </div>
  </div>

  <div id="boardWrap"></div>

  <div class="side">
    <div class="panel">
      <h3>백에게 잡힌 흑 기물</h3>
      <div class="captured-row" id="capBlack"></div>
    </div>
  </div>
</div>

<div id="log-box"><div id="log"></div></div>

<div id="piece-modal">
  <div id="piece-modal-box">
    <button id="piece-close">✕</button>
    <h3>기물 행마 안내</h3>
    <div id="piece-tabs"></div>
    <div id="piece-content"></div>
  </div>
</div>

<div id="promoModal">
  <div id="promoBox">
    <div>승급할 기물을 선택해</div>
    <div class="choices" id="promoChoices"></div>
  </div>
</div>

<script>
const ROWS = 10, COLS = 10;

const GLYPH = {
  w: {K:'♔', Q:'♕', R:'♖', B:'♗', N:'♘', P:'♙'},
  b: {K:'♚', Q:'♛', R:'♜', B:'♝', N:'♞', P:'♟'}
};

const GLYPH_TO_PIECE = {
  '♔':{type:'K',color:'w'}, '♕':{type:'Q',color:'w'}, '♖':{type:'R',color:'w'},
  '♗':{type:'B',color:'w'}, '♘':{type:'N',color:'w'}, '♙':{type:'P',color:'w'},
  '♚':{type:'K',color:'b'}, '♛':{type:'Q',color:'b'}, '♜':{type:'R',color:'b'},
  '♝':{type:'B',color:'b'}, '♞':{type:'N',color:'b'}, '♟':{type:'P',color:'b'}
};

const INITIAL_STATE = {
  "9_5": "♔", "9_4": "♕", "9_0": "♖", "9_9": "♖", "9_2": "♘", "9_7": "♘",
  "8_1": "♗", "8_3": "♗", "8_6": "♗", "8_8": "♗",
  "7_0": "♙", "7_1": "♙", "7_2": "♙", "7_3": "♙", "7_4": "♙",
  "7_5": "♙", "7_6": "♙", "7_7": "♙", "7_8": "♙", "7_9": "♙",
  "2_0": "♟", "2_1": "♟", "2_2": "♟", "2_3": "♟", "2_4": "♟",
  "2_5": "♟", "2_6": "♟", "2_7": "♟", "2_8": "♟", "2_9": "♟",
  "1_1": "♝", "1_3": "♝", "1_6": "♝", "1_8": "♝",
  "0_0": "♜", "0_9": "♜", "0_2": "♞", "0_7": "♞", "0_5": "♚", "0_4": "♛"
};

const PIECE_VALUES = { P:3, B:5, R:8, N:10, Q:13, K:1000 };

const ROOK_DIRS = [[1,0],[-1,0],[0,1],[0,-1]];
const BISHOP_DIRS = [[1,1],[1,-1],[-1,1],[-1,-1]];
const KING_DIRS = [...ROOK_DIRS, ...BISHOP_DIRS];
const KNIGHT_VECS = [[1,2],[1,-2],[-1,2],[-1,-2],[2,1],[2,-1],[-2,1],[-2,-1]];

function inBounds(r,c){ return r>=0 && r<ROWS && c>=0 && c<COLS; }
function isGeneralType(t){ return t==='R' || t==='N' || t==='Q' || t==='K'; }

function freshBoard(){
  const b = Array.from({length:ROWS}, () => Array(COLS).fill(null));
  for(const key in INITIAL_STATE){
    const [r,c] = key.split('_').map(Number);
    b[r][c] = {...GLYPH_TO_PIECE[INITIAL_STATE[key]]};
  }
  return b;
}

function cloneBoard(board){
  return board.map(row => row.map(cell => cell ? {...cell} : null));
}

// generate pseudo-legal moves (no self-check filtering) for the piece at r,c
function genMoves(board, r, c){
  const piece = board[r][c];
  if(!piece) return [];
  const { type, color } = piece;
  const moves = [];

  function tryStep(tr, tc, opts={}){
    const { moveOnly=false, captureOnly=false } = opts;
    if(!inBounds(tr,tc)) return;
    const target = board[tr][tc];
    if(!target){
      if(!captureOnly) moves.push({to:[tr,tc], capture:false});
    } else if(target.color !== color){
      if(!moveOnly) moves.push({to:[tr,tc], capture:true});
    }
  }

  function slide(dirs, opts={}){
    const { moveOnly=false, captureOnly=false } = opts;
    for(const [dr,dc] of dirs){
      let tr=r+dr, tc=c+dc;
      while(inBounds(tr,tc)){
        const target = board[tr][tc];
        if(!target){
          if(!captureOnly) moves.push({to:[tr,tc], capture:false});
          tr+=dr; tc+=dc; continue;
        } else if(target.color !== color){
          if(!moveOnly) moves.push({to:[tr,tc], capture:true});
          break;
        } else {
          break;
        }
      }
    }
  }

  if(type === 'K'){
    for(const [dr,dc] of KING_DIRS) tryStep(r+dr, c+dc);
  }
  else if(type === 'N'){
    // 켄타우로스: 만(king) 벡터는 이동 전용, 나이트 벡터는 이동+캡처
    for(const [dr,dc] of KING_DIRS) tryStep(r+dr, c+dc, {moveOnly:true});
    for(const [dr,dc] of KNIGHT_VECS) tryStep(r+dr, c+dc);
  }
  else if(type === 'R'){
    // 렌서: 이동=나이트(빈칸만), 캡처=룩 슬라이드
    for(const [dr,dc] of KNIGHT_VECS) tryStep(r+dr, c+dc, {moveOnly:true});
    slide(ROOK_DIRS, {captureOnly:true});
  }
  else if(type === 'Q'){
    // 팔콘: 이동=퀸 슬라이드(빈칸만), 캡처=만(king, 1칸 전용)
    slide([...ROOK_DIRS, ...BISHOP_DIRS], {moveOnly:true});
    for(const [dr,dc] of KING_DIRS) tryStep(r+dr, c+dc, {captureOnly:true});
  }
  else if(type === 'B'){
    // 비숍: 기본 페르즈, 장수(직교 인접) 있으면 풀 대각 슬라이더
    let buffed = false;
    for(const [dr,dc] of ROOK_DIRS){
      const nr=r+dr, nc=c+dc;
      if(inBounds(nr,nc)){
        const np = board[nr][nc];
        if(np && np.color===color && isGeneralType(np.type)){ buffed = true; break; }
      }
    }
    if(buffed) slide(BISHOP_DIRS);
    else for(const [dr,dc] of BISHOP_DIRS) tryStep(r+dr, c+dc);
  }
  else if(type === 'P'){
    const dir = color==='w' ? -1 : 1;

    // 1. 정면 1칸: 이동 전용
    tryStep(r+dir, c, {moveOnly:true});

    // 2. 대각 앞 1칸: 캡처 전용, 반대편 대각 뒤 지지 시 이동 추가(이동+캡처)
    const rearLeftR=r-dir, rearLeftC=c-1;
    const rearRightR=r-dir, rearRightC=c+1;
    const rearLeftHas = inBounds(rearLeftR,rearLeftC) && board[rearLeftR][rearLeftC] &&
      board[rearLeftR][rearLeftC].color===color && board[rearLeftR][rearLeftC].type==='P';
    const rearRightHas = inBounds(rearRightR,rearRightC) && board[rearRightR][rearRightC] &&
      board[rearRightR][rearRightC].color===color && board[rearRightR][rearRightC].type==='P';

    tryStep(r+dir, c-1, {captureOnly: !rearRightHas});
    tryStep(r+dir, c+1, {captureOnly: !rearLeftHas});

    // 3. 전방에 아군 폰: 그 폰을 뛰어넘는 나이트 벡터(전진축2/측면축1), 이동 전용
    const frontR=r+dir, frontC=c;
    const frontHasFriendlyPawn = inBounds(frontR,frontC) && board[frontR][frontC] &&
      board[frontR][frontC].color===color && board[frontR][frontC].type==='P';
    if(frontHasFriendlyPawn){
      tryStep(r+2*dir, c-1, {moveOnly:true});
      tryStep(r+2*dir, c+1, {moveOnly:true});
    }

    // 4. 측면에 아군 폰: 그 폰을 뛰어넘는 나이트 벡터(측면축2/전진축1), 이동 전용
    const leftP = inBounds(r,c-1) ? board[r][c-1] : undefined;
    const rightP = inBounds(r,c+1) ? board[r][c+1] : undefined;
    const leftHasPawn = leftP && leftP.color===color && leftP.type==='P';
    const rightHasPawn = rightP && rightP.color===color && rightP.type==='P';
    if(leftHasPawn){ tryStep(r+1, c-2, {moveOnly:true}); tryStep(r-1, c-2, {moveOnly:true}); }
    if(rightHasPawn){ tryStep(r+1, c+2, {moveOnly:true}); tryStep(r-1, c+2, {moveOnly:true}); }

    // 5. 후방(같은 파일 바로 뒤)에 아군 폰: 정면 2칸째 개방(슬라이드, 1칸째가 막혀있으면 불가), 이동 전용
    const rearFileR=r-dir, rearFileC=c;
    const rearFileHasPawn = inBounds(rearFileR,rearFileC) && board[rearFileR][rearFileC] &&
      board[rearFileR][rearFileC].color===color && board[rearFileR][rearFileC].type==='P';
    if(rearFileHasPawn){
      const frontFirstEmpty = inBounds(r+dir,c) && !board[r+dir][c];
      if(frontFirstEmpty){
        tryStep(r+2*dir, c, {moveOnly:true});
      }
    }

    // 슬라이드형 2칸 확장 헬퍼: 중간 칸이 막혀있으면 진행 불가, 캡처 시 그 자리에서 멈춤
    function extend2(dr, dc, opts={}){
      const { moveOnly=false, captureOnly=false } = opts;
      let tr=r+dr, tc=c+dc;
      for(let step=0; step<2 && inBounds(tr,tc); step++){
        const target = board[tr][tc];
        if(!target){
          if(!captureOnly) moves.push({to:[tr,tc], capture:false});
          tr+=dr; tc+=dc;
          continue;
        } else if(target.color !== color){
          if(!moveOnly) moves.push({to:[tr,tc], capture:true});
          break;
        } else {
          break;
        }
      }
    }

    // 6. 장수(룩·나이트·퀸·킹) 인접: 인접한 축의 반대 방향으로 1·2칸 슬라이드, 이동+캡처
    const upP = inBounds(r-1,c) ? board[r-1][c] : undefined;
    const downP = inBounds(r+1,c) ? board[r+1][c] : undefined;
    const frontGenP = dir===-1 ? upP : downP;
    const rearGenP = dir===-1 ? downP : upP;
    const hasGenFront = frontGenP && frontGenP.color===color && isGeneralType(frontGenP.type);
    const hasGenRear = rearGenP && rearGenP.color===color && isGeneralType(rearGenP.type);
    const hasGenLeft = leftP && leftP.color===color && isGeneralType(leftP.type);
    const hasGenRight = rightP && rightP.color===color && isGeneralType(rightP.type);

    if(hasGenFront){
      // 앞에 장수 → 반대 방향(후방) 1·2칸 슬라이드 개방
      extend2(-dir, 0);
    }
    if(hasGenRear){
      // 뒤에 장수 → 반대 방향(전방) 1·2칸 슬라이드(1칸째는 기존 이동전용에 캡처가 추가됨)
      extend2(dir, 0);
    }
    if(hasGenLeft){
      // 왼쪽에 장수 → 반대 방향(오른쪽) 1·2칸 슬라이드 개방
      extend2(0, 1);
    }
    if(hasGenRight){
      // 오른쪽에 장수 → 반대 방향(왼쪽) 1·2칸 슬라이드 개방
      extend2(0, -1);
    }
  }

  return moves;
}

function allPseudoMoves(board, color){
  const all = [];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const p = board[r][c];
    if(p && p.color===color){
      for(const m of genMoves(board,r,c)){
        all.push({from:[r,c], to:m.to, capture:m.capture});
      }
    }
  }
  return all;
}

function findKing(board, color){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const p = board[r][c];
    if(p && p.type==='K' && p.color===color) return [r,c];
  }
  return null;
}

function isSquareAttacked(board, sq, byColor){
  const moves = allPseudoMoves(board, byColor);
  return moves.some(m => m.capture && m.to[0]===sq[0] && m.to[1]===sq[1]);
}

function isInCheck(board, color){
  const k = findKing(board, color);
  if(!k) return false;
  return isSquareAttacked(board, k, color==='w' ? 'b' : 'w');
}

function legalMovesForColor(board, color){
  const pseudo = allPseudoMoves(board, color);
  const legal = [];
  for(const m of pseudo){
    const nb = cloneBoard(board);
    const [fr,fc] = m.from, [tr,tc] = m.to;
    nb[tr][tc] = nb[fr][fc];
    nb[fr][fc] = null;
    if(!isInCheck(nb, color)) legal.push(m);
  }
  return legal;
}

// ===== AI (정적 트리탐색, 미니맥스+알파베타) =====
function oppColor(c){ return c==='w' ? 'b' : 'w'; }

function evaluateMaterial(board){
  const nonKingCount = countNonKingPieces(board);
  const pawnVal = nonKingCount<=5 ? 5 : (nonKingCount<=10 ? 4 : PIECE_VALUES.P);
  let score = 0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const p = board[r][c];
    if(p){
      const val = p.type==='P' ? pawnVal : PIECE_VALUES[p.type];
      score += (p.color==='w' ? 1 : -1) * val;
    }
  }
  return score;
}

function countNonKingPieces(board){
  let n = 0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const p = board[r][c];
    if(p && p.type!=='K') n++;
  }
  return n;
}

// 재료 우위가 크게 벌어진 국면(엔드게임)에서 상대 킹을 가장자리로 몰고
// 내 킹을 접근시키도록 유도하는 보너스. 그 외에는 0.
function endgameBonus(board, matDiff){
  const wKing = findKing(board,'w');
  const bKing = findKing(board,'b');
  if(!wKing || !bKing) return 0;
  if(countNonKingPieces(board) > 10) return 0; // 기물이 많이 남아있으면 적용 안 함
  if(Math.abs(matDiff) < 8) return 0; // 우위가 확실하지 않으면 적용 안 함

  const centerR = (ROWS-1)/2, centerC = (COLS-1)/2;
  const bKingEdgeDist = Math.max(Math.abs(bKing[0]-centerR), Math.abs(bKing[1]-centerC));
  const wKingEdgeDist = Math.max(Math.abs(wKing[0]-centerR), Math.abs(wKing[1]-centerC));
  const kingsDist = Math.abs(wKing[0]-bKing[0]) + Math.abs(wKing[1]-bKing[1]);

  let bonus = 0;
  if(matDiff > 0){
    // 백이 크게 앞섬 → 흑 킹은 가장자리로, 백 킹은 접근
    bonus += bKingEdgeDist * 0.5;
    bonus -= kingsDist * 0.1;
  } else {
    // 흑이 크게 앞섬 → 백 킹은 가장자리로, 흑 킹은 접근
    bonus -= wKingEdgeDist * 0.5;
    bonus += kingsDist * 0.1;
  }
  return bonus;
}

function evaluateFull(board){
  const m = evaluateMaterial(board);
  return m + endgameBonus(board, m);
}

function applyMoveSim(board, mv){
  const nb = cloneBoard(board);
  const [fr,fc] = mv.from, [tr,tc] = mv.to;
  const moving = nb[fr][fc];
  nb[tr][tc] = moving;
  nb[fr][fc] = null;
  if(moving && moving.type==='P' && ((moving.color==='w' && tr===0) || (moving.color==='b' && tr===ROWS-1))){
    nb[tr][tc] = { type:'Q', color:moving.color };
  }
  return nb;
}

let SEARCH_DEPTH = 5;
const TIME_LIMIT_MS = 3000;
let searchDeadline = 0;

function negamax(board, depth, alpha, beta, color){
  if(depth===0 || Date.now() > searchDeadline){
    const m = evaluateFull(board);
    return color==='w' ? m : -m;
  }
  const moves = allPseudoMoves(board, color);
  if(moves.length===0){
    const m = evaluateFull(board);
    return color==='w' ? m : -m;
  }
  moves.sort((a,b) => (b.capture?1:0) - (a.capture?1:0));

  let best = -Infinity;
  for(const mv of moves){
    const nb = applyMoveSim(board, mv);
    const val = -negamax(nb, depth-1, -beta, -alpha, oppColor(color));
    if(val > best) best = val;
    if(best > alpha) alpha = best;
    if(alpha >= beta) break;
    if(Date.now() > searchDeadline) break;
  }
  return best;
}

function findBestMove(board, color, depth){
  const rootMoves = legalMovesForColor(board, color);
  if(rootMoves.length===0) return null;

  searchDeadline = Date.now() + TIME_LIMIT_MS;

  // 동점일 때 다양성을 위해 순서 섞기
  const shuffled = [...rootMoves];
  for(let i=shuffled.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  shuffled.sort((a,b) => (b.capture?1:0) - (a.capture?1:0));

  let alpha = -Infinity, beta = Infinity;
  let bestMove = shuffled[0], bestVal = -Infinity;

  for(const mv of shuffled){
    if(Date.now() > searchDeadline) break;
    const nb = applyMoveSim(board, mv);
    const val = -negamax(nb, depth-1, -beta, -alpha, oppColor(color));
    if(val > bestVal){ bestVal = val; bestMove = mv; }
    if(bestVal > alpha) alpha = bestVal;
  }
  return bestMove;
}

// ===== 게임 상태 =====
let board = freshBoard();
let turn = 'w';
let selected = null;
let legalDestinations = [];
let capturedByWhite = [];
let capturedByBlack = [];
let gameOver = false;
let statusMessage = '백 차례';
let checkColor = null;
let pendingPromotion = null;
let history = [];
let aiEnabled = { w:false, b:false };
let aiThinking = false;
let moveCount = 1;
let moveLog = [];

function colLabel(c){
  let s=''; c+=1;
  while(c>0){ const rem=(c-1)%26; s=String.fromCharCode(97+rem)+s; c=Math.floor((c-1)/26); }
  return s;
}

function sqLabel(r,c){ return colLabel(c) + (ROWS-r); }

function logMove(from, to, pieceType, color, capture){
  const mv = (pieceType==='P' ? '' : pieceType) + sqLabel(from[0],from[1]) + (capture?'x':'') + sqLabel(to[0],to[1]);
  if(color==='w'){
    moveLog.push({ n:moveCount, w:mv, b:null });
  } else {
    if(moveLog.length>0 && moveLog[moveLog.length-1].b===null){
      moveLog[moveLog.length-1].b = mv;
    } else {
      moveLog.push({ n:moveCount, w:null, b:mv });
    }
    moveCount++;
  }
  renderLog();
}

function renderLog(){
  const el = document.getElementById('log');
  el.textContent = moveLog.map(m => m.n + '.' + (m.w||'...') + (m.b ? ' '+m.b : '')).join('  ');
}

const BOARD_FRAME_PX = 480; // 4개 게임 공통 상수

function buildBoardDom(){
  const wrap = document.getElementById('boardWrap');
  const cellSize = Math.floor(BOARD_FRAME_PX / COLS);
  const labelSize = 20;
  wrap.style.gridTemplateColumns = `${labelSize}px repeat(${COLS}, ${cellSize}px)`;
  wrap.style.gridTemplateRows = `repeat(${ROWS}, ${cellSize}px) ${labelSize}px`;
  wrap.innerHTML = '';

  for(let r=0;r<ROWS;r++){
    const rl = document.createElement('div');
    rl.className='rowlabel';
    rl.textContent = ROWS - r;
    wrap.appendChild(rl);
    for(let c=0;c<COLS;c++){
      const sq = document.createElement('div');
      const isLight = (r+c)%2===0;
      sq.className = 'sq ' + (isLight?'light':'dark');
      sq.style.width = cellSize+'px';
      sq.style.height = cellSize+'px';
      sq.style.fontSize = Math.floor(cellSize*0.7)+'px';
      sq.dataset.r = r; sq.dataset.c = c;
      sq.onclick = () => onSquareClick(r,c);
      wrap.appendChild(sq);
    }
  }
  const corner = document.createElement('div');
  wrap.appendChild(corner);
  for(let c=0;c<COLS;c++){
    const cl = document.createElement('div');
    cl.className='collabel';
    cl.textContent = colLabel(c);
    wrap.appendChild(cl);
  }
}

function render(){
  const wrap = document.getElementById('boardWrap');
  const squares = wrap.querySelectorAll('.sq');
  squares.forEach(sq => {
    const r = parseInt(sq.dataset.r), c = parseInt(sq.dataset.c);
    sq.innerHTML = '';
    sq.classList.remove('selected','inCheck');

    const piece = board[r][c];
    if(piece){
      const span = document.createElement('span');
      span.className = 'glyph ' + (piece.color==='w' ? 'white-piece' : 'black-piece');
      span.textContent = GLYPH[piece.color][piece.type];
      sq.appendChild(span);
    }

    if(selected && selected[0]===r && selected[1]===c){
      sq.classList.add('selected');
    }
    if(checkColor){
      const k = findKing(board, checkColor);
      if(k && k[0]===r && k[1]===c) sq.classList.add('inCheck');
    }

    const dest = legalDestinations.find(d => d.to[0]===r && d.to[1]===c);
    if(dest){
      const m = document.createElement('div');
      m.className = 'marker ' + (dest.capture ? 'capture' : 'move');
      sq.appendChild(m);
    }
  });

  const statusEl = document.getElementById('status');
  statusEl.textContent = statusMessage;
  statusEl.className = gameOver ? 'over' : (checkColor ? 'check' : '');

  document.getElementById('capWhite').textContent = capturedByBlack.map(p => GLYPH['w'][p]).join(' ');
  document.getElementById('capBlack').textContent = capturedByWhite.map(p => GLYPH['b'][p]).join(' ');
}

function onSquareClick(r,c){
  if(gameOver || pendingPromotion || aiThinking) return;
  const piece = board[r][c];

  if(selected){
    const dest = legalDestinations.find(d => d.to[0]===r && d.to[1]===c);
    if(dest){
      makeMove(selected, [r,c]);
      return;
    }
    if(piece && piece.color===turn){
      selectPiece(r,c);
      return;
    }
    selected = null;
    legalDestinations = [];
    render();
    return;
  } else {
    if(piece && piece.color===turn){
      selectPiece(r,c);
    }
  }
}

function selectPiece(r,c){
  selected = [r,c];
  const legal = legalMovesForColor(board, turn).filter(m => m.from[0]===r && m.from[1]===c);
  legalDestinations = legal.map(m => ({to:m.to, capture:m.capture}));
  render();
}

function snapshotState(){
  return {
    board: cloneBoard(board),
    turn,
    capturedByWhite: [...capturedByWhite],
    capturedByBlack: [...capturedByBlack],
    gameOver,
    statusMessage,
    checkColor,
    moveCount,
    moveLog: moveLog.map(m => ({...m}))
  };
}

function makeMove(from, to, autoPromoteType=null){
  history.push(snapshotState());

  const [fr,fc] = from, [tr,tc] = to;
  const moving = board[fr][fc];
  const captured = board[tr][tc];

  if(captured){
    if(captured.color==='w') capturedByBlack.push(captured.type);
    else capturedByWhite.push(captured.type);
  }

  logMove(from, to, moving.type, moving.color, !!captured);

  board[tr][tc] = moving;
  board[fr][fc] = null;
  selected = null;
  legalDestinations = [];

  if(moving.type==='P' && ((moving.color==='w' && tr===0) || (moving.color==='b' && tr===ROWS-1))){
    if(autoPromoteType){
      board[tr][tc] = { type:autoPromoteType, color:moving.color };
      finishTurn();
      return;
    }
    pendingPromotion = {r:tr, c:tc, color:moving.color};
    render();
    showPromotionModal();
    return;
  }

  finishTurn();
}

function finishTurn(){
  turn = (turn==='w') ? 'b' : 'w';
  const legal = legalMovesForColor(board, turn);
  const check = isInCheck(board, turn);
  checkColor = check ? turn : null;

  if(legal.length===0){
    gameOver = true;
    const winner = (turn==='w') ? '흑' : '백';
    statusMessage = check ? `체크메이트! ${winner} 승리` : `스테일메이트! ${winner} 승리`;
  } else {
    const turnLabel = (turn==='w') ? '백' : '흑';
    statusMessage = turnLabel + ' 차례' + (check ? ' (체크)' : '');
  }
  render();
  maybeTriggerAI();
}

function showPromotionModal(){
  const modal = document.getElementById('promoModal');
  const choices = document.getElementById('promoChoices');
  choices.innerHTML = '';
  const options = ['Q','R','N','B'];
  options.forEach(type => {
    const btn = document.createElement('button');
    btn.textContent = GLYPH[pendingPromotion.color][type];
    btn.style.color = pendingPromotion.color==='w' ? '#fff' : '#000';
    if(pendingPromotion.color==='b') btn.style.background = '#888';
    btn.onclick = () => {
      board[pendingPromotion.r][pendingPromotion.c] = {type, color: pendingPromotion.color};
      pendingPromotion = null;
      modal.classList.remove('show');
      finishTurn();
    };
    choices.appendChild(btn);
  });
  modal.classList.add('show');
}

function undoMove(){
  if(history.length===0) return;
  aiThinking = false;
  if(pendingPromotion){
    pendingPromotion = null;
    document.getElementById('promoModal').classList.remove('show');
  }
  const prev = history.pop();
  board = prev.board;
  turn = prev.turn;
  capturedByWhite = prev.capturedByWhite;
  capturedByBlack = prev.capturedByBlack;
  gameOver = prev.gameOver;
  statusMessage = prev.statusMessage;
  checkColor = prev.checkColor;
  moveCount = prev.moveCount;
  moveLog = prev.moveLog;
  selected = null;
  legalDestinations = [];
  renderLog();
  render();
}

function resetGame(){
  board = freshBoard();
  turn = 'w';
  selected = null;
  legalDestinations = [];
  capturedByWhite = [];
  capturedByBlack = [];
  gameOver = false;
  checkColor = null;
  statusMessage = '백 차례';
  history = [];
  aiThinking = false;
  moveCount = 1;
  moveLog = [];
  renderLog();
  render();
  maybeTriggerAI();
}

function maybeTriggerAI(){
  if(gameOver || pendingPromotion || aiThinking) return;
  if(aiEnabled[turn]){
    aiThinking = true;
    const turnLabel = (turn==='w') ? '백' : '흑';
    document.getElementById('status').textContent = turnLabel + ' AI 생각 중...';
    setTimeout(runAIMove, 50);
  }
}

function runAIMove(){
  aiThinking = false;
  if(gameOver || pendingPromotion) return;
  const mv = findBestMove(board, turn, SEARCH_DEPTH);
  if(!mv){ render(); return; }
  makeMove(mv.from, mv.to, 'Q');
}

document.getElementById('aiWhiteToggle').onchange = (e) => {
  aiEnabled.w = e.target.checked;
  maybeTriggerAI();
};
document.getElementById('aiBlackToggle').onchange = (e) => {
  aiEnabled.b = e.target.checked;
  maybeTriggerAI();
};

document.querySelectorAll('input[name="aiDepth"]').forEach(radio => {
  radio.onchange = (e) => {
    if(e.target.checked) SEARCH_DEPTH = parseInt(e.target.value);
  };
});

document.getElementById('resetBtn').onclick = resetGame;
document.getElementById('undoBtn').onclick = undoMove;
document.getElementById('rulesBtn').onclick = openPieceModal;
document.getElementById('piece-close').onclick = closePieceModal;

buildBoardDom();
render();
renderLog();

            if(3-i>=0){ g[3-i][3-i]='mv-cap'; g[3-i][3+i]='mv-cap'; }
            if(3+i<7){ g[3+i][3-i]='mv-cap'; g[3+i][3+i]='mv-cap'; }
          }
          return g;
        })(),
        desc:'직교로 인접한 아군 장수(룩/나이트/퀸/킹)가 있으면 대각 4방향 무제한 슬라이드로 강화.',
        legends:[['mv-cap','#7a5500','이동+캡처']]
      }
    ]
  },
  P: {
    name: '폰', icon:'♙',
    boards: [
      {
        label:'기본',
        grid: (() => {
          const g = makeGrid(5); g[2][2]='piece-cell';
          g[1][2]='mv';
          g[1][1]='cap'; g[1][3]='cap';
          return g;
        })(),
        desc:'정면 1칸: 이동 전용. 대각 앞 2방향: 캡처 전용.',
        legends:[['mv','#4a7a10','이동 전용'],['cap','#7a2020','캡처 전용']]
      },
      {
        label:'전방에 아군 폰이 있으면',
        grid: (() => {
          const g = makeGrid(5); g[2][2]='piece-cell';
          g[1][2]='ally';
          g[0][1]='mv'; g[0][3]='mv';
          return g;
        })(),
        desc:'바로 앞의 아군 폰을 뛰어넘는 나이트 벡터 2칸(전진축2/측면축1)으로 이동(이동 전용).',
        legends:[['ally','#2a5a9a','아군 폰'],['mv','#4a7a10','이동 전용']]
      },
      {
        label:'측면(좌/우)에 아군 폰이 있으면',
        grid: (() => {
          const g = makeGrid(5); g[2][2]='piece-cell';
          g[2][1]='ally';
          g[1][0]='mv'; g[3][0]='mv';
          return g;
        })(),
        desc:'측면 아군 폰을 뛰어넘는 나이트 벡터 2칸(측면축2/전진축1)으로 이동(이동 전용). 반대편에 있을 때도 좌우 대칭으로 동일하게 적용.',
        legends:[['ally','#2a5a9a','아군 폰'],['mv','#4a7a10','이동 전용']]
      },
      {
        label:'바로 뒤(같은 파일)에 아군 폰이 있으면',
        grid: (() => {
          const g = makeGrid(5); g[2][2]='piece-cell';
          g[3][2]='ally';
          g[0][2]='mv';
          return g;
        })(),
        desc:'정면 1칸이 비어있을 때 정면 2칸째까지 이동 가능(이동 전용).',
        legends:[['ally','#2a5a9a','아군 폰'],['mv','#4a7a10','이동 전용']]
      },
      {
        label:'장수(룩·나이트·퀸·킹)가 인접하면',
        grid: (() => {
          const g = makeGrid(5); g[2][2]='piece-cell';
          g[2][1]='gen';
          g[2][3]='mv'; g[2][4]='mv';
          return g;
        })(),
        desc:'인접한 방향의 반대쪽으로 1·2칸 슬라이드 이동(그림은 왼쪽에 장수가 있어 오른쪽으로 슬라이드하는 예시). 앞/뒤/좌/우 어느 쪽에 있어도 반대 방향에 동일하게 적용되며, 뒤쪽에 장수가 있는 경우엔 그 슬라이드에 캡처도 포함된다.',
        legends:[['gen','#2a5a9a','아군 장수'],['mv','#4a7a10','이동 전용']]
      }
    ]
  }
};

const PIECE_ORDER = ['P','N','R','B','Q','K'];
let activePieceTab = 'P';

function openPieceModal(){
  document.getElementById('piece-modal').classList.add('show');
  renderPieceTabs();
  renderPieceContent(activePieceTab);
}
function closePieceModal(){
  document.getElementById('piece-modal').classList.remove('show');
}

function renderPieceTabs(){
  const tabs = document.getElementById('piece-tabs');
  tabs.innerHTML = '';
  for(const key of PIECE_ORDER){
    const btn = document.createElement('button');
    btn.className = 'ptab' + (key===activePieceTab ? ' active' : '');
    btn.textContent = PIECE_MODAL_DATA[key].name;
    btn.onclick = () => { activePieceTab = key; renderPieceTabs(); renderPieceContent(key); };
    tabs.appendChild(btn);
  }
}

function renderPieceContent(key){
  const data = PIECE_MODAL_DATA[key];
  const cont = document.getElementById('piece-content');
  cont.innerHTML = '';
  cont.style.flexWrap = 'wrap';

  for(const b of data.boards){
    const sec = document.createElement('div');
    sec.className = 'terrain-section';
    sec.style.marginBottom = '10px';

    const h5 = document.createElement('h5');
    h5.textContent = b.label;
    sec.appendChild(h5);

    const grid = b.grid;
    const size = grid.length;
    const mb = document.createElement('div');
    mb.className = 'mini-board';
    mb.style.gridTemplateColumns = `repeat(${size}, 32px)`;
    mb.style.gridTemplateRows = `repeat(${size}, 32px)`;

    for(let r=0;r<size;r++){
      for(let c=0;c<size;c++){
        const cell = document.createElement('div');
        const isL = (r+c)%2===0;
        cell.className = 'mc ' + (isL?'chk-l':'chk-d');
        const sp = grid[r][c];
        if(sp==='gen'){
          cell.classList.add('ally');
          cell.textContent = '♜';
        } else if(sp==='ally'){
          cell.classList.add('ally');
          cell.textContent = data.icon;
        } else if(sp==='piece-cell'){
          cell.classList.add('piece-cell');
          cell.textContent = data.icon;
        } else if(sp==='mv' || sp==='cap' || sp==='mv-cap'){
          const dot = document.createElement('span');
          dot.className = 'dot ' + (sp==='mv-cap' ? 'mvcap' : sp);
          cell.appendChild(dot);
        } else if(sp){
          cell.classList.add(sp);
        }
        mb.appendChild(cell);
      }
    }
    sec.appendChild(mb);

    const leg = document.createElement('div');
    leg.className = 'legend-row';
    for(const [cls, color, lbl] of b.legends){
      if(cls==='mv' || cls==='cap' || cls==='mv-cap'){
        const dotClass = cls==='mv-cap' ? 'mvcap' : cls;
        leg.innerHTML += `<div class="leg"><span class="leg-box"><span class="dot ${dotClass}"></span></span>${lbl}</div>`;
      } else {
        leg.innerHTML += `<div class="leg"><span class="leg-box" style="background:${color}"></span>${lbl}</div>`;
      }
    }
    sec.appendChild(leg);

    const desc = document.createElement('div');
    desc.className = 'piece-desc';
    desc.textContent = b.desc;
    sec.appendChild(desc);

    cont.appendChild(sec);
  }
}
</script>
