<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishenoy Vinoy Laquir</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<style>
  * { box-sizing: border-box; }
  /* 전역 테마 토큰 (4개 게임과 동일한 값) — 심플(기본) */
  :root, html[data-theme="simple"]{
    --bg:#1e1e1e; --panel-bg:#2a2a2a; --panel-bg-soft:rgba(42,42,42,.8); --border:#444; --text:#eee; --text-dim:#999;
    --accent:#9ccc65; --accent-border:#8fbc5a; --btn-accent-bg:#3a4d2a;
    --font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
  }
  /* 전역 테마 토큰 — 브라운 */
  html[data-theme="brown"]{
    --bg:#1c0e05; --panel-bg:#2a1508; --panel-bg-soft:rgba(42,21,8,.8); --border:#3a2010; --text:#e8d5b0; --text-dim:#a08060;
    --accent:#c9a84c; --accent-border:#c9a84c; --btn-accent-bg:rgba(201,168,76,.18);
    --font-family: 'Crimson Text', Georgia, serif;
  }
  body {
    margin: 0;
    font-family: var(--font-family);
    line-height: 1.2;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  header {
    width: 100%;
    text-align: center;
    padding: 16px 8px 8px;
    position: relative;
  }
  #hub-dim {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 50;
  }
  #corner-badge {
    display: none;
    position: absolute;
    top: 14px; left: 14px;
    width: 30px; height: 30px;
    color: var(--accent);
  }
  #corner-badge svg {
    width: 100%; height: 100%; display: block;
  }
  button {
    -webkit-tap-highlight-color: transparent;
  }
  #title-btn {
    display: inline-block;
    margin: 0 0 12px;
    font-size: 1.22rem;
    font-weight: 700;
    font-family: var(--font-family);
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 8px;
  }
  #title-btn:focus {
    outline: none;
  }
  @media (hover: hover) {
    #title-btn:hover {
      background: rgba(255,255,255,0.08);
    }
  }
  #theme-toggle {
    position: absolute; top: 14px; right: 14px;
    width: 118px; height: 34px;
    border-radius: 17px; overflow: hidden;
    border: 1px solid var(--border);
  }
  #theme-toggle button {
    position: absolute; inset: 0; width: 100%; height: 100%;
    display: flex; align-items: center;
    font-size: .72rem; font-weight: 600; letter-spacing: .01em;
    font-family: var(--font-family);
    border: none; cursor: pointer;
    background: var(--panel-bg); color: var(--text-dim);
  }
  #theme-toggle button[data-theme-btn="simple"] {
    clip-path: polygon(0 0, 61% 0, 39% 100%, 0 100%);
    justify-content: flex-start; padding-left: 10px;
  }
  #theme-toggle button[data-theme-btn="brown"] {
    clip-path: polygon(61% 0, 100% 0, 100% 100%, 39% 100%);
    justify-content: flex-end; padding-right: 10px;
  }
  #theme-toggle button.active { background: var(--btn-accent-bg); color: var(--accent); }
  #theme-toggle .divider {
    position: absolute; inset: 0; pointer-events: none;
    clip-path: polygon(60.1% 0, 61.9% 0, 39.9% 100%, 38.1% 100%);
    background: var(--text); opacity: .55;
  }
  nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
    padding-bottom: 8px;
  }
  nav button {
    padding: 10px 18px;
    font-size: 0.85rem;
    line-height: 1.2;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel-bg);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font-family);
  }
  @media (hover: hover) {
    nav button:hover {
      filter: brightness(1.2);
    }
  }
  nav button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1410;
  }
  #gameFrame {
    width: 100%;
    border: none;
    min-height: 300px;
    background: var(--bg);
    position: relative;
    z-index: 60;
  }
  #home-view {
    width: 100%;
    position: relative;
    display: flex;
    justify-content: center;
    padding: 38px 16px 40px;
  }
  #home-watermark {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 0;
    color: var(--accent);
    opacity: .07;
  }
  #home-watermark svg {
    width: min(70%, 340px);
    height: auto;
  }
  #homeNav {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }
  #homeNav button {
    padding: 20px;
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.2;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--panel-bg-soft);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font-family);
  }
  @media (hover: hover) {
    #homeNav button:hover {
      filter: brightness(1.2);
    }
  }
  #homeNav button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1410;
  }
  #game-view {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
  #site-footer {
    width: 100%;
    max-width: 900px;
    margin-top: auto;
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    font-size: .68rem;
    color: var(--text-dim);
  }
  .footer-col {
    flex: 1 1 0;
    min-width: 160px;
    text-align: left;
  }
  .footer-license {
    flex: 2 1 0;
  }
  .footer-col h4 {
    margin: 0 0 4px;
    font-size: .6rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-dim);
    font-weight: 700;
  }
  .footer-heading-btn {
    display: inline;
    background: none;
    border: none;
    padding: 0;
    margin: 0;
    font: inherit;
    text-transform: inherit;
    letter-spacing: inherit;
    color: inherit;
    cursor: pointer;
  }
  @media (hover: hover) {
    .footer-heading-btn:hover {
      color: var(--accent);
    }
  }
  .footer-col div {
    margin-bottom: 1px;
    line-height: 1.35;
  }
  .footer-col a {
    color: var(--accent);
    text-decoration: none;
  }
  .footer-links {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  .footer-link-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    width: fit-content;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 3px 9px;
    background: var(--panel-bg);
    color: var(--text);
    font-weight: 600;
    font-size: .66rem;
    text-decoration: none;
  }
  .footer-link-btn svg {
    width: 12px; height: 12px;
    fill: currentColor;
  }
  @media (max-width: 480px) {
    #title-btn { font-size: .92rem; }
    #theme-toggle { width: 88px; height: 26px; }
    #theme-toggle button { font-size: .58rem; }
    #theme-toggle button[data-theme-btn="simple"] { padding-left: 6px; }
    #theme-toggle button[data-theme-btn="brown"] { padding-right: 6px; }
    nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    nav button {
      padding: 6px 2px; font-size: .62rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #homeNav button { padding: 14px; font-size: .85rem; }
    #corner-badge { width: 22px; height: 22px; top: 11px; left: 10px; }
    #game-view { margin-bottom: 40px; }
    #site-footer { padding: 10px 6px 12px; gap: 4px; font-size: .48rem; }
    .footer-col { min-width: 0; }
    .footer-col h4 { font-size: .44rem; margin-bottom: 3px; }
    .footer-col div { margin-bottom: 0; line-height: 1.3; }
    .footer-links { gap: 3px; }
    .footer-link-btn { font-size: .44rem; padding: 2px 5px; gap: 3px; }
    .footer-link-btn svg { width: 9px; height: 9px; }
  }
</style>
</head>

<script>
const titleBtn = document.getElementById('title-btn');
const homeView = document.getElementById('home-view');
const gameView = document.getElementById('game-view');
const homeNav = document.getElementById('homeNav');
const gameNav = document.getElementById('gameNav');
const frame = document.getElementById('gameFrame');
const cornerBadge = document.getElementById('corner-badge');

function showHome() {
  homeView.style.display = 'flex';
  gameView.style.display = 'none';
  cornerBadge.style.display = 'none';
}

function showGame() {
  homeView.style.display = 'none';
  gameView.style.display = 'flex';
  cornerBadge.style.display = 'block';
}

let currentSrc = null;

function selectGame(btn) {
  const src = btn.dataset.src;
  gameNav.querySelectorAll('button').forEach(b => {
    b.classList.toggle('active', b.dataset.src === src);
  });
  if (src !== currentSrc) {
    currentSrc = src;
    frame.src = src;
  }
  showGame();
  btn.blur();
}

function showInfo() {
  gameNav.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  if (currentSrc !== 'info.html') {
    currentSrc = 'info.html';
    frame.src = 'info.html';
  }
  showGame();
  infoBtn.blur();
}

const infoBtn = document.getElementById('infoBtn');
infoBtn.addEventListener('click', showInfo);

homeNav.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  selectGame(btn);
});

gameNav.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  selectGame(btn);
});

titleBtn.addEventListener('click', () => {
  showHome();
  titleBtn.blur();
});

// ===== 전역 테마 (심플/브라운, localStorage로 허브+게임 전체 공유) =====
const THEME_KEY = 'newchess-theme';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('#theme-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.themeBtn === t);
  });
}
applyTheme(localStorage.getItem(THEME_KEY) || 'simple');
document.querySelectorAll('#theme-toggle button').forEach(btn => {
  btn.onclick = () => {
    const t = btn.dataset.themeBtn;
    localStorage.setItem(THEME_KEY, t);
    applyTheme(t);
  };
});
// 게임(iframe) 안에서 테마를 바꾼 경우에도 허브가 즉시 따라가도록
window.addEventListener('storage', (e) => {
  if (e.key === THEME_KEY) applyTheme(e.newValue || 'simple');
});

// 게임(iframe) 안에서 모달이 열리면 허브 헤더/네비도 함께 어둡게 처리
const hubDim = document.getElementById('hub-dim');
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'newchess-modal') {
    hubDim.style.display = e.data.open ? 'block' : 'none';
  }
  if (e.data && e.data.type === 'newchess-height') {
    frame.style.height = e.data.height + 'px';
  }
});

// 어둡게 처리된 헤더 영역을 클릭하면 iframe 안의 열린 모달을 닫도록 요청
hubDim.onclick = () => {
  frame.contentWindow.postMessage({ type: 'newchess-close-modal' }, '*');
};
</script>
