<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ліҖнҳ• мІҙмҠӨ 4мў…</title>
<style>
  * { box-sizing: border-box; }
  /* м „м—ӯ н…Ңл§Ҳ нҶ нҒ° (4к°ң кІҢмһ„кіј лҸҷмқјн•ң к°’) вҖ” мӢ¬н”Ң(кё°ліё) */
  :root, html[data-theme="simple"]{
    --bg:#1e1e1e; --panel-bg:#2a2a2a; --border:#444; --text:#eee; --text-dim:#999;
    --accent:#9ccc65; --accent-border:#8fbc5a; --btn-accent-bg:#3a4d2a;
    --font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
  }
  /* м „м—ӯ н…Ңл§Ҳ нҶ нҒ° вҖ” лёҢлқјмҡҙ */
  html[data-theme="brown"]{
    --bg:#1c0e05; --panel-bg:#2a1508; --border:#3a2010; --text:#e8d5b0; --text-dim:#a08060;
    --accent:#c9a84c; --accent-border:#c9a84c; --btn-accent-bg:rgba(201,168,76,.18);
    --font-family: 'Crimson Text', Georgia, serif;
  }
  body {
    margin: 0;
    font-family: var(--font-family);
    line-height: 1.2;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  header {
    width: 100%;
    text-align: center;
    padding: 16px 8px 8px;
    position: relative;
  }
  #hub-dim {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 50;
  }
  header h1 {
    margin: 0 0 12px;
    font-size: 1.3rem;
  }
  #theme-toggle {
    position: absolute; top: 14px; right: 14px;
    width: 118px; height: 34px;
    border-radius: 17px; overflow: hidden;
    border: 1px solid var(--border);
  }
  #theme-toggle button {
    position: absolute; inset: 0; width: 100%; height: 100%;
    display: flex; align-items: center;
    font-size: .72rem; font-weight: 600; letter-spacing: .01em;
    font-family: var(--font-family);
    border: none; cursor: pointer;
    background: var(--panel-bg); color: var(--text-dim);
  }
  #theme-toggle button[data-theme-btn="simple"] {
    clip-path: polygon(0 0, 61% 0, 39% 100%, 0 100%);
    justify-content: flex-start; padding-left: 10px;
  }
  #theme-toggle button[data-theme-btn="brown"] {
    clip-path: polygon(61% 0, 100% 0, 100% 100%, 39% 100%);
    justify-content: flex-end; padding-right: 10px;
  }
  #theme-toggle button.active { background: var(--btn-accent-bg); color: var(--accent); }
  #theme-toggle .divider {
    position: absolute; inset: 0; pointer-events: none;
    clip-path: polygon(60.1% 0, 61.9% 0, 39.9% 100%, 38.1% 100%);
    background: var(--text); opacity: .55;
  }
  nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding-bottom: 8px;
  }
  nav button {
    padding: 10px 18px;
    font-size: 0.95rem;
    line-height: 1.2;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel-bg);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font-family);
  }
  nav button:hover {
    filter: brightness(1.2);
  }
  nav button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1410;
  }
  #gameFrame {
    width: 100%;
    flex: 1;
    border: none;
    min-height: 80vh;
    background: var(--bg);
  }
  #placeholder {
    color: var(--text-dim);
    margin-top: 40px;
    font-size: 1rem;
  }
</style>
</head>
<body>
<header>
  <div id="hub-dim"></div>
  <h1>ліҖнҳ• мІҙмҠӨ 4мў…</h1>
  <div id="theme-toggle">
    <button data-theme-btn="simple">мӢ¬н”Ң</button>
    <button data-theme-btn="brown">нҒҙлһҳмӢқ</button>
    <span class="divider"></span>
  </div>
  <nav id="gameNav">
    <button data-src="games/support-chess.html">Synergy Chess</button>
    <button data-src="games/pirate-chess.html">Pirate Chess</button>
    <button data-src="games/demotion-chess.html">Demotion Chess</button>
    <button data-src="games/stack-and-seal.html">Stack &amp; Seal</button>
  </nav>
</header>

<p id="placeholder">мң„м—җм„ң кІҢмһ„мқ„ м„ нғқн•ҳм„ёмҡ”.</p>
<iframe id="gameFrame" style="display:none;"></iframe>

<script>
const nav = document.getElementById('gameNav');
const frame = document.getElementById('gameFrame');
const placeholder = document.getElementById('placeholder');

function selectGame(btn) {
  [...nav.querySelectorAll('button')].forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  frame.src = btn.dataset.src;
  frame.style.display = 'block';
  placeholder.style.display = 'none';
}

nav.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  selectGame(btn);
});

// ===== м „м—ӯ н…Ңл§Ҳ (мӢ¬н”Ң/лёҢлқјмҡҙ, localStorageлЎң н—ҲлёҢ+кІҢмһ„ м „мІҙ кіөмң ) =====
const THEME_KEY = 'newchess-theme';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('#theme-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.themeBtn === t);
  });
}
applyTheme(localStorage.getItem(THEME_KEY) || 'simple');
document.querySelectorAll('#theme-toggle button').forEach(btn => {
  btn.onclick = () => {
    const t = btn.dataset.themeBtn;
    localStorage.setItem(THEME_KEY, t);
    applyTheme(t);
  };
});
// кІҢмһ„(iframe) м•Ҳм—җм„ң н…Ңл§ҲлҘј л°”кҫј кІҪмҡ°м—җлҸ„ н—ҲлёҢк°Җ мҰүмӢң л”°лқјк°ҖлҸ„лЎқ
window.addEventListener('storage', (e) => {
  if (e.key === THEME_KEY) applyTheme(e.newValue || 'simple');
});

// кІҢмһ„(iframe) м•Ҳм—җм„ң лӘЁлӢ¬мқҙ м—ҙлҰ¬л©ҙ н—ҲлёҢ н—ӨлҚ”/л„Өл№„лҸ„ н•Ёк»ҳ м–ҙл‘ЎкІҢ мІҳлҰ¬
const hubDim = document.getElementById('hub-dim');
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'newchess-modal') {
    hubDim.style.display = e.data.open ? 'block' : 'none';
  }
});
</script>
</body>
</html>
