<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>변형 체스 4종</title>
<style>
  * { box-sizing: border-box; }
  /* 전역 테마 토큰 (4개 게임과 동일한 값) — 심플(기본) */
  :root, html[data-theme="simple"]{
    --bg:#1e1e1e; --panel-bg:#2a2a2a; --border:#444; --text:#eee; --text-dim:#999;
    --accent:#9ccc65; --accent-border:#8fbc5a; --btn-accent-bg:#3a4d2a;
    --font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
  }
  /* 전역 테마 토큰 — 브라운 */
  html[data-theme="brown"]{
    --bg:#1c0e05; --panel-bg:#2a1508; --border:#3a2010; --text:#e8d5b0; --text-dim:#a08060;
    --accent:#c9a84c; --accent-border:#c9a84c; --btn-accent-bg:rgba(201,168,76,.18);
    --font-family: 'Crimson Text', Georgia, serif;
  }
  body {
    margin: 0;
    font-family: var(--font-family);
    line-height: 1.2;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  header {
    width: 100%;
    text-align: center;
    padding: 16px 8px 8px;
    position: relative;
  }
  #hub-dim {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 50;
  }
  #title-btn {
    display: inline-block;
    margin: 0 0 12px;
    font-size: 1.3rem;
    font-weight: 700;
    font-family: var(--font-family);
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 8px;
  }
  #title-btn:hover {
    background: rgba(255,255,255,0.08);
  }
  #theme-toggle {
    position: absolute; top: 14px; right: 14px;
    width: 118px; height: 34px;
    border-radius: 17px; overflow: hidden;
    border: 1px solid var(--border);
  }
  #theme-toggle button {
    position: absolute; inset: 0; width: 100%; height: 100%;
    display: flex; align-items: center;
    font-size: .72rem; font-weight: 600; letter-spacing: .01em;
    font-family: var(--font-family);
    border: none; cursor: pointer;
    background: var(--panel-bg); color: var(--text-dim);
  }
  #theme-toggle button[data-theme-btn="simple"] {
    clip-path: polygon(0 0, 61% 0, 39% 100%, 0 100%);
    justify-content: flex-start; padding-left: 10px;
  }
  #theme-toggle button[data-theme-btn="brown"] {
    clip-path: polygon(61% 0, 100% 0, 100% 100%, 39% 100%);
    justify-content: flex-end; padding-right: 10px;
  }
  #theme-toggle button.active { background: var(--btn-accent-bg); color: var(--accent); }
  #theme-toggle .divider {
    position: absolute; inset: 0; pointer-events: none;
    clip-path: polygon(60.1% 0, 61.9% 0, 39.9% 100%, 38.1% 100%);
    background: var(--text); opacity: .55;
  }
  nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding-bottom: 8px;
  }
  nav button {
    padding: 10px 18px;
    font-size: 0.95rem;
    line-height: 1.2;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel-bg);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font-family);
  }
  nav button:hover {
    filter: brightness(1.2);
  }
  nav button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1410;
  }
  #gameFrame {
    width: 100%;
    border: none;
    min-height: 300px;
    background: var(--bg);
  }
  #home-view {
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 24px 16px 40px;
  }
  #homeNav {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }
  #homeNav button {
    padding: 22px;
    font-size: 1.15rem;
    font-weight: 600;
    line-height: 1.2;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--panel-bg);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font-family);
  }
  #homeNav button:hover {
    filter: brightness(1.2);
  }
  #homeNav button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1410;
  }
  #game-view {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
  @media (max-width: 480px) {
    #title-btn { font-size: 1rem; }
    #theme-toggle { width: 88px; height: 26px; }
    #theme-toggle button { font-size: .58rem; }
    #theme-toggle button[data-theme-btn="simple"] { padding-left: 6px; }
    #theme-toggle button[data-theme-btn="brown"] { padding-right: 6px; }
    nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    nav button {
      padding: 6px 2px; font-size: .62rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #homeNav button { padding: 18px; font-size: 1rem; }
  }
</style>
</head>
<body>
<header>
  <div id="hub-dim"></div>
  <button id="title-btn" type="button">변형 체스 4종</button>
  <div id="theme-toggle">
    <button data-theme-btn="simple">심플</button>
    <button data-theme-btn="brown">클래식</button>
    <span class="divider"></span>
  </div>
</header>

<div id="home-view">
  <div id="homeNav">
    <button data-src="games/support-chess.html">Synergy Chess</button>
    <button data-src="games/pirate-chess.html">Pirate Chess</button>
    <button data-src="games/demotion-chess.html">Demotion Chess</button>
    <button data-src="games/stack-and-seal.html">Stack &amp; Seal</button>
  </div>
</div>

<div id="game-view" style="display:none;">
  <nav id="gameNav">
    <button data-src="games/support-chess.html">Synergy Chess</button>
    <button data-src="games/pirate-chess.html">Pirate Chess</button>
    <button data-src="games/demotion-chess.html">Demotion Chess</button>
    <button data-src="games/stack-and-seal.html">Stack &amp; Seal</button>
  </nav>
  <iframe id="gameFrame"></iframe>
</div>

<script>
const titleBtn = document.getElementById('title-btn');
const homeView = document.getElementById('home-view');
const gameView = document.getElementById('game-view');
const homeNav = document.getElementById('homeNav');
const gameNav = document.getElementById('gameNav');
const frame = document.getElementById('gameFrame');

function showHome() {
  homeView.style.display = 'flex';
  gameView.style.display = 'none';
}

function showGame() {
  homeView.style.display = 'none';
  gameView.style.display = 'flex';
}

function selectGame(btn) {
  const src = btn.dataset.src;
  [...homeNav.querySelectorAll('button'), ...gameNav.querySelectorAll('button')].forEach(b => {
    b.classList.toggle('active', b.dataset.src === src);
  });
  frame.src = src;
  showGame();
}

homeNav.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  selectGame(btn);
});

gameNav.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  selectGame(btn);
});

titleBtn.addEventListener('click', showHome);

// ===== 전역 테마 (심플/브라운, localStorage로 허브+게임 전체 공유) =====
const THEME_KEY = 'newchess-theme';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('#theme-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.themeBtn === t);
  });
}
applyTheme(localStorage.getItem(THEME_KEY) || 'simple');
document.querySelectorAll('#theme-toggle button').forEach(btn => {
  btn.onclick = () => {
    const t = btn.dataset.themeBtn;
    localStorage.setItem(THEME_KEY, t);
    applyTheme(t);
  };
});
// 게임(iframe) 안에서 테마를 바꾼 경우에도 허브가 즉시 따라가도록
window.addEventListener('storage', (e) => {
  if (e.key === THEME_KEY) applyTheme(e.newValue || 'simple');
});

// 게임(iframe) 안에서 모달이 열리면 허브 헤더/네비도 함께 어둡게 처리
const hubDim = document.getElementById('hub-dim');
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'newchess-modal') {
    hubDim.style.display = e.data.open ? 'block' : 'none';
  }
  if (e.data && e.data.type === 'newchess-height') {
    frame.style.height = e.data.height + 'px';
  }
});

// 어둡게 처리된 헤더 영역을 클릭하면 iframe 안의 열린 모달을 닫도록 요청
hubDim.onclick = () => {
  frame.contentWindow.postMessage({ type: 'newchess-close-modal' }, '*');
};
</script>
</body>
</html>
