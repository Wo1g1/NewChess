<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>변형 체스 4종</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    background: #1e1e1e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  header {
    width: 100%;
    text-align: center;
    padding: 16px 8px 8px;
  }
  header h1 {
    margin: 0 0 12px;
    font-size: 1.3rem;
  }
  nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding-bottom: 8px;
  }
  nav button {
    padding: 10px 18px;
    font-size: 0.95rem;
    border: 1px solid #555;
    border-radius: 8px;
    background: #2a2a2a;
    color: #eee;
    cursor: pointer;
  }
  nav button:hover {
    background: #3a3a3a;
  }
  nav button.active {
    background: #4a7dff;
    border-color: #4a7dff;
    color: #fff;
  }
  #gameFrame {
    width: 100%;
    max-width: 900px;
    flex: 1;
    border: none;
    min-height: 80vh;
    background: #fff;
  }
  #placeholder {
    color: #999;
    margin-top: 40px;
    font-size: 1rem;
  }
</style>
</head>
<body>
<header>
  <h1>변형 체스 4종</h1>
  <nav id="gameNav">
    <button data-src="games/support-chess.html">서포트체스</button>
    <button data-src="games/pirate-chess.html">해적체스</button>
    <button data-src="games/demotion-chess.html">강급체스</button>
    <button data-src="games/stack-and-seal.html">Stack &amp; Seal</button>
  </nav>
</header>

<p id="placeholder">위에서 게임을 선택하세요.</p>
<iframe id="gameFrame" style="display:none;"></iframe>

<script>
const nav = document.getElementById('gameNav');
const frame = document.getElementById('gameFrame');
const placeholder = document.getElementById('placeholder');

function selectGame(btn) {
  [...nav.querySelectorAll('button')].forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  frame.src = btn.dataset.src;
  frame.style.display = 'block';
  placeholder.style.display = 'none';
}

nav.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  selectGame(btn);
});
</script>
</body>
</html>
