<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>변형 체스 4종</title>
<style>
  * { box-sizing: border-box; }
  /* 전역 테마 토큰 (4개 게임과 동일한 값) — 심플(기본) */
  :root, html[data-theme="simple"]{
    --bg:#1e1e1e; --panel-bg:#2a2a2a; --border:#444; --text:#eee; --text-dim:#999;
    --accent:#9ccc65; --accent-border:#8fbc5a; --btn-accent-bg:#3a4d2a;
    --font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
  }
  /* 전역 테마 토큰 — 브라운 */
  html[data-theme="brown"]{
    --bg:#1c0e05; --panel-bg:#2a1508; --border:#3a2010; --text:#e8d5b0; --text-dim:#a08060;
    --accent:#c9a84c; --accent-border:#c9a84c; --btn-accent-bg:rgba(201,168,76,.18);
    --font-family: 'Crimson Text', Georgia, serif;
  }
  body {
    margin: 0;
    font-family: var(--font-family);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  header {
    width: 100%;
    text-align: center;
    padding: 16px 8px 8px;
  }
  header h1 {
    margin: 0 0 12px;
    font-size: 1.3rem;
  }
  #theme-toggle { display:flex; gap:4px; justify-content:center; margin-bottom:10px; }
  #theme-toggle button { flex:none; font-size:.8rem; padding:6px 14px; }
  #theme-toggle button.active { background:var(--btn-accent-bg); border-color:var(--accent-border); color:var(--accent); }
  nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding-bottom: 8px;
  }
  nav button {
    padding: 10px 18px;
    font-size: 0.95rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel-bg);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font-family);
  }
  nav button:hover {
    filter: brightness(1.2);
  }
  nav button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1410;
  }
  #gameFrame {
    width: 100%;
    flex: 1;
    border: none;
    min-height: 80vh;
    background: var(--bg);
  }
  #placeholder {
    color: var(--text-dim);
    margin-top: 40px;
    font-size: 1rem;
  }
</style>
</head>
<body>
<header>
  <h1>변형 체스 4종</h1>
  <div id="theme-toggle">
    <button data-theme-btn="simple">심플</button>
    <button data-theme-btn="brown">브라운</button>
  </div>
  <nav id="gameNav">
    <button data-src="games/support-chess.html">서포트체스</button>
    <button data-src="games/pirate-chess.html">해적체스</button>
    <button data-src="games/demotion-chess.html">강급체스</button>
    <button data-src="games/stack-and-seal.html">Stack &amp; Seal</button>
  </nav>
</header>

<p id="placeholder">위에서 게임을 선택하세요.</p>
<iframe id="gameFrame" style="display:none;"></iframe>

<script>
const nav = document.getElementById('gameNav');
const frame = document.getElementById('gameFrame');
const placeholder = document.getElementById('placeholder');

function selectGame(btn) {
  [...nav.querySelectorAll('button')].forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  frame.src = btn.dataset.src;
  frame.style.display = 'block';
  placeholder.style.display = 'none';
}

nav.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  selectGame(btn);
});

// ===== 전역 테마 (심플/브라운, localStorage로 허브+게임 전체 공유) =====
const THEME_KEY = 'newchess-theme';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('#theme-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.themeBtn === t);
  });
}
applyTheme(localStorage.getItem(THEME_KEY) || 'simple');
document.querySelectorAll('#theme-toggle button').forEach(btn => {
  btn.onclick = () => {
    const t = btn.dataset.themeBtn;
    localStorage.setItem(THEME_KEY, t);
    applyTheme(t);
  };
});
// 게임(iframe) 안에서 테마를 바꾼 경우에도 허브가 즉시 따라가도록
window.addEventListener('storage', (e) => {
  if (e.key === THEME_KEY) applyTheme(e.newValue || 'simple');
});
</script>
</body>
</html>
